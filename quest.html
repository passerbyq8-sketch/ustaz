<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="robots" content="noindex, nofollow">
<title>المربّي — رحلةُ الكنوز</title>
<!--
  رحلةُ الكنوز · صفحةٌ مستقلّةٌ تعملُ بلا إنترنت
  لا تمسُّ index.html ولا أيَّ ملفٍّ من التطبيق. حذفُها = حذفُ هذا الملفِّ ومجلّدِ quest-data.
  ترتيبُ التحميل: ./quest-data/<file> ثمّ ./<file> ثمّ النسخةُ المدموجةُ أدناه.
  فزيادةُ الأسئلة = استبدالُ quest-data/trivia-golden.json وحدَه، بلا إعادةِ بناءِ الصفحة.
  التفكيكُ الكاملُ عندَ الحاجة:
     assets/styles.css        ← القسم <style>
     assets/core.js           ← الوحدة ١
     assets/play.js           ← الوحدة ٢
     assets/ui.js             ← الوحدة ٣
     data/trivia-golden.json  ← <script id="bank">
     data/world.json          ← <script id="world">
     data/rewards.json        ← <script id="rewards">
  المُحمِّلُ يجرّبُ ./file.json أوّلًا ثمّ يرجعُ للنسخةِ المدموجة،
  فلا يحتاجُ الكودُ أيَّ تعديلٍ عندَ الفصل.
  لا نداءَ نموذج · لا رموز · لا شبكة · لا إعلانات.
-->
<style>
/* ==========================================================
   المربّي — رحلةُ الكنوز · نظامُ التصميم
   خطوطٌ محلّيّة فقط · لا شبكة · ألوانٌ دافئة · عربيٌّ أوّلًا
   ========================================================== */
:root{
  /* the theme layer overwrites these — see rewards.json > themes */
  --paper:#FAF4E9; --paper2:#F2E7D3; --card:#FFFDF8;
  --ink:#2A2118; --ink2:#6E6152; --ink3:#9A8C79;
  --honey:#E0A32E; --honey2:#B77C15; --honey-soft:#FBEFD4;
  --palm:#2E7D63; --palm-soft:#E3F0EA;
  --pom:#9C2F3E; --pom-soft:#F7E4E6;
  --lapis:#2B5C8A; --lapis-soft:#E4EDF5;
  --line:#E7D9BF; --shadow:24px 32px 60px -34px rgba(60,42,15,.45);
  --r-lg:26px; --r:18px; --r-sm:12px;
  --display:"Sakkal Majalla","Traditional Arabic","Arabic Typesetting",serif;
  --body:"Segoe UI","Sakkal Majalla",Tahoma,system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:var(--body);color:var(--ink);font-size:17px;line-height:1.7;
  background:var(--paper);
  background-image:
    radial-gradient(900px 420px at 82% -6%, color-mix(in srgb,var(--honey) 16%, transparent), transparent 66%),
    radial-gradient(700px 420px at 8% 104%, color-mix(in srgb,var(--palm) 12%, transparent), transparent 62%);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
}
.app{max-width:980px;margin:0 auto;padding:0 16px 96px}

/* ---------- type ---------- */
h1,h2,h3{font-family:var(--display);font-weight:700;margin:0;line-height:1.25}
h1{font-size:44px}h2{font-size:34px}h3{font-size:26px}
.muted{color:var(--ink2)}
.tiny{font-size:13px;color:var(--ink3)}
.eyebrow{font-size:12px;letter-spacing:3px;color:var(--ink3)}

/* ---------- top bar ---------- */
.hud{
  position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--paper) 88%,transparent);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line);margin:0 -16px 18px;padding:9px 16px;
}
.hud-in{max-width:980px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pill{
  display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);
  border-radius:999px;padding:5px 13px;font-size:14px;font-weight:600;white-space:nowrap
}
.pill.coin{color:var(--honey2)} .pill.star{color:var(--honey2)} .pill.streak{color:var(--pom)}
.pill b{font-family:var(--display);font-size:19px;line-height:1}
.grow{flex:1}
.lvl{display:flex;align-items:center;gap:9px}
.lvl-ring{
  width:42px;height:42px;border-radius:50%;flex:none;display:grid;place-items:center;
  background:conic-gradient(var(--honey) calc(var(--p)*1%), var(--honey-soft) 0);
}
.lvl-ring i{width:33px;height:33px;border-radius:50%;background:var(--card);display:grid;place-items:center;
  font-style:normal;font-family:var(--display);font-size:18px;font-weight:700;color:var(--ink)}

/* ---------- buttons ---------- */
button{font-family:inherit;font-size:inherit;cursor:pointer;border:none;background:none;color:inherit}
.btn{
  background:var(--card);border:1px solid var(--line);border-radius:999px;padding:11px 22px;
  font-weight:600;transition:transform .16s cubic-bezier(.2,.8,.3,1),box-shadow .16s,border-color .16s;
  box-shadow:0 2px 0 color-mix(in srgb,var(--line) 70%,transparent)
}
.btn:hover{transform:translateY(-2px);border-color:var(--honey)}
.btn:active{transform:translateY(0)}
.btn:focus-visible{outline:3px solid var(--honey);outline-offset:3px}
.btn.primary{background:linear-gradient(180deg,var(--honey),var(--honey2));color:#2A2118;border-color:var(--honey2);
  box-shadow:0 3px 0 color-mix(in srgb,var(--honey2) 70%,#000)}
.btn.quiet{background:transparent;box-shadow:none}
.btn.sm{padding:7px 15px;font-size:14px}
.btn.wide{width:100%;justify-content:center;display:flex}
.btn[disabled]{opacity:.4;cursor:not-allowed;transform:none}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row.center{justify-content:center}

/* ---------- cards ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:22px;box-shadow:var(--shadow)}
.card.tight{padding:16px;border-radius:var(--r)}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}

/* ---------- the map (signature) ---------- */
.worldhead{display:flex;align-items:flex-end;gap:12px;margin:6px 0 16px}
.chapter{margin:26px 0 12px;display:flex;align-items:center;gap:12px}
.chapter h3{color:var(--ink)}
.chapter .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
.map{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:16px}
.region{
  position:relative;text-align:center;padding:20px 14px 18px;border-radius:var(--r-lg);
  background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);
  transition:transform .2s cubic-bezier(.2,.8,.3,1),box-shadow .2s;overflow:hidden
}
.region:hover{transform:translateY(-4px)}
.region.locked{opacity:.55;filter:grayscale(.5)}
.region .medal{width:78px;height:78px;margin:0 auto 10px;display:block}
.region h3{font-size:23px;margin-bottom:2px}
.region .sub{font-size:12.5px;color:var(--ink3)}
.region .stars{margin-top:9px;font-size:15px;letter-spacing:3px;color:var(--honey2)}
.region .stars .off{color:var(--line)}
.region .bar{height:6px;border-radius:99px;background:var(--honey-soft);margin-top:11px;overflow:hidden}
.region .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--honey),var(--honey2));border-radius:99px;
  transition:width .6s cubic-bezier(.2,.8,.3,1)}
.region .flag{position:absolute;inset-inline-start:12px;top:12px;font-size:11px;background:var(--pom-soft);
  color:var(--pom);border-radius:99px;padding:2px 9px;font-weight:700}
.region .chest{position:absolute;inset-inline-end:10px;top:10px;font-size:20px}

/* ---------- station list ---------- */
.stations{display:grid;gap:12px}
.station{
  display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
  border-radius:var(--r);padding:14px 18px;box-shadow:var(--shadow);text-align:start;width:100%;
  transition:transform .16s,border-color .16s
}
.station:hover:not([disabled]){transform:translateX(-4px);border-color:var(--honey)}
.station .n{
  width:46px;height:46px;flex:none;border-radius:16px;display:grid;place-items:center;
  font-family:var(--display);font-size:22px;font-weight:700;background:var(--honey-soft);color:var(--honey2)
}
.station.done .n{background:var(--palm-soft);color:var(--palm)}
.station .t{flex:1}
.station .t b{display:block;font-size:17px}
.station .t span{font-size:13px;color:var(--ink3)}
.station .st{letter-spacing:2px;color:var(--honey2);font-size:14px}
.station .st .off{color:var(--line)}

/* ---------- play ---------- */
.playtop{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.progressbar{flex:1;height:10px;border-radius:99px;background:var(--honey-soft);overflow:hidden}
.progressbar i{display:block;height:100%;background:linear-gradient(90deg,var(--honey),var(--honey2));
  transition:width .45s cubic-bezier(.2,.8,.3,1)}
.timerpill{font-family:var(--display);font-size:24px;font-weight:700;min-width:64px;text-align:center;
  background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px 12px}
.timerpill.low{color:var(--pom);border-color:var(--pom)}
.qcard{animation:rise .34s cubic-bezier(.2,.8,.3,1) both}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.qmeta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.tag{font-size:12px;border:1px solid var(--line);border-radius:999px;padding:2px 11px;color:var(--ink2);background:var(--paper2)}
.tag.warn{border-color:var(--pom);color:var(--pom);background:var(--pom-soft)}
.tag.gold{border-color:var(--honey2);color:var(--honey2);background:var(--honey-soft)}
.qtext{font-family:var(--display);font-size:33px;line-height:1.45;margin:2px 0 6px}
.verse{font-family:var(--display);font-size:37px;line-height:1.95;text-align:center;margin:14px 0 6px}
.blank{display:inline-block;min-width:120px;border-bottom:4px dotted var(--honey2);margin:0 8px;vertical-align:bottom}
.choices{display:grid;gap:12px;margin-top:20px}
.choice{
  display:flex;align-items:center;gap:12px;text-align:start;background:var(--card);
  border:2px solid var(--line);border-radius:var(--r);padding:16px 18px;font-size:20px;font-weight:600;
  transition:transform .14s,border-color .14s,background .14s
}
.choice:hover:not([disabled]){transform:translateY(-2px);border-color:var(--honey)}
.choice .k{
  width:30px;height:30px;flex:none;border-radius:10px;display:grid;place-items:center;font-size:15px;
  background:var(--paper2);color:var(--ink2);font-family:var(--display);font-weight:700
}
.choice.ok{border-color:var(--palm);background:var(--palm-soft)}
.choice.ok .k{background:var(--palm);color:#fff}
.choice.bad{border-color:var(--pom);background:var(--pom-soft)}
.choice.bad .k{background:var(--pom);color:#fff}
.choice[disabled]{cursor:default}
.tf{grid-template-columns:1fr 1fr}
.tf .choice{justify-content:center;font-size:24px;font-family:var(--display)}

/* ---------- ordering ---------- */
.orderlist{display:grid;gap:10px;margin-top:18px}
.oitem{
  display:flex;align-items:center;gap:12px;background:var(--card);border:2px solid var(--line);
  border-radius:var(--r);padding:13px 16px;font-size:19px;touch-action:none;user-select:none;
  transition:box-shadow .16s,border-color .16s,transform .12s
}
.oitem.drag{box-shadow:0 18px 34px -18px rgba(60,42,15,.6);border-color:var(--honey);z-index:5;position:relative}
.oitem .hand{color:var(--ink3);font-size:19px;cursor:grab;line-height:1}
.oitem .pos{width:28px;height:28px;flex:none;border-radius:9px;background:var(--honey-soft);color:var(--honey2);
  display:grid;place-items:center;font-family:var(--display);font-weight:700;font-size:16px}
.oitem .txt{flex:1}
.oitem .mv{display:flex;flex-direction:column;gap:2px}
.oitem .mv button{font-size:13px;line-height:1;padding:2px 6px;border-radius:7px;background:var(--paper2);color:var(--ink2)}
.oitem.ok{border-color:var(--palm);background:var(--palm-soft)}
.oitem.bad{border-color:var(--pom);background:var(--pom-soft)}

/* ---------- match ---------- */
.matchwrap{display:grid;gap:10px;margin-top:18px}
.mpair{display:grid;grid-template-columns:1fr 34px 1fr;gap:8px;align-items:center}
.mside{
  background:var(--card);border:2px solid var(--line);border-radius:var(--r);padding:13px 15px;font-size:18px;
  text-align:center;transition:.14s
}
.mside.pick{border-color:var(--honey);background:var(--honey-soft)}
.mside.ok{border-color:var(--palm);background:var(--palm-soft)}
.mside.bad{border-color:var(--pom);background:var(--pom-soft)}
.mlink{text-align:center;color:var(--ink3);font-size:15px}
.mcols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.mcol{display:grid;gap:10px}

/* ---------- memory ---------- */
.memgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px}
.mcard{
  aspect-ratio:3/4;border-radius:var(--r);border:2px solid var(--line);background:var(--paper2);
  display:grid;place-items:center;padding:8px;font-size:15px;text-align:center;line-height:1.4;
  transition:transform .3s cubic-bezier(.2,.8,.3,1),background .2s,border-color .2s;transform-style:preserve-3d
}
.mcard .face{display:none}
.mcard.up,.mcard.done{background:var(--card);border-color:var(--honey)}
.mcard.up .face,.mcard.done .face{display:block}
.mcard.up .back,.mcard.done .back{display:none}
.mcard.done{border-color:var(--palm);background:var(--palm-soft);opacity:.85}
.mcard .back{font-size:26px;color:var(--honey2)}

/* ---------- verdict ---------- */
.verdict{margin-top:18px;border-radius:var(--r);padding:16px 18px;border:1px solid var(--line);background:var(--paper2);
  animation:rise .3s cubic-bezier(.2,.8,.3,1) both}
.verdict.good{background:var(--palm-soft);border-color:var(--palm)}
.verdict.bad{background:var(--pom-soft);border-color:var(--pom)}
.verdict h4{margin:0 0 6px;font-family:var(--display);font-size:24px}
.verdict .src{display:block;margin-top:8px;font-size:12.5px;color:var(--ink3)}
.gain{display:inline-flex;gap:10px;margin-top:10px;font-weight:700;font-size:14px}
.gain span{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px 12px}

/* ---------- teams board ---------- */
.teams{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.tcard{flex:1 1 140px;min-width:130px;background:var(--card);border:2px solid var(--line);border-radius:var(--r);padding:12px 15px}
.tcard.turn{border-color:var(--honey);background:var(--honey-soft)}
.tcard .nm{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}
.tcard .sc{font-family:var(--display);font-size:32px;line-height:1.1}
.dot{width:12px;height:12px;border-radius:4px;flex:none}
.track{display:grid;gap:10px;margin:14px 0}
.trow{background:var(--card);border:2px solid var(--line);border-radius:var(--r);padding:12px 14px}
.trow.turn{border-color:var(--honey);background:var(--honey-soft)}
.trow .th{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.trow .th b{flex:1;font-size:15px}
.trow .th .n{font-family:var(--display);font-size:23px;line-height:1}
.path{display:flex;align-items:center;gap:4px;overflow-x:auto;padding:3px 0;scrollbar-width:none}
.path::-webkit-scrollbar{display:none}
.dotp{width:9px;height:9px;border-radius:50%;background:var(--line);flex:none}
.dotp.done{background:var(--honey)}
.dotp.here{width:auto;height:auto;background:none;font-size:22px;line-height:1}
.dotp.goal{width:auto;height:auto;background:none;font-size:20px;margin-inline-start:5px}
.pickgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:10px;margin-top:10px}
.pickcard{background:var(--card);border:2px solid var(--line);border-radius:var(--r);padding:12px 8px;text-align:center;transition:transform .15s,border-color .15s}
.pickcard:hover:not([disabled]){border-color:var(--honey);transform:translateY(-3px)}
.pickcard .medal{width:46px;height:46px;margin:0 auto 6px;display:block}
.pickcard b{font-size:14px;display:block;line-height:1.3}
.pickcard span{font-size:11px;color:var(--ink3)}
.pickcard[disabled]{opacity:.35}
.stepbig{font-family:var(--display);font-size:40px;color:var(--honey2);line-height:1.1}

/* ---------- collection ---------- */
.book{display:grid;gap:12px}
.tcardk{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
.tcardk .q{font-family:var(--display);font-size:21px;margin-bottom:4px}
.tcardk .w{font-size:15px;color:var(--ink2)}
.badgegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:12px}
.badge{text-align:center;padding:16px 8px;border-radius:var(--r);border:1px solid var(--line);background:var(--card)}
.badge .ic{font-size:34px;line-height:1.2}
.badge .nm{font-size:13px;font-weight:700;margin-top:6px}
.badge.off{opacity:.38;filter:grayscale(1)}
.badge .cond{font-size:11px;color:var(--ink3);margin-top:3px}

/* ---------- misc ---------- */
.notice{border-radius:var(--r);padding:12px 16px;font-size:14px;margin-bottom:16px;
  background:var(--pom-soft);border:1px solid var(--pom);color:var(--pom)}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:6px 14px;font-size:14px;color:var(--ink2)}
.chip[aria-pressed="true"]{background:var(--honey-soft);border-color:var(--honey);color:var(--honey2);font-weight:700}
.toast{
  position:fixed;inset-inline:0;bottom:22px;margin:auto;width:max-content;max-width:88%;z-index:80;
  background:var(--ink);color:var(--paper);border-radius:999px;padding:11px 22px;font-weight:600;
  box-shadow:0 20px 40px -20px rgba(0,0,0,.5);animation:pop .3s cubic-bezier(.2,.8,.3,1) both
}
@keyframes pop{from{opacity:0;transform:translateY(16px) scale(.96)}to{opacity:1;transform:none}}
.sheet{position:fixed;inset:0;z-index:90;display:grid;place-items:center;padding:18px;
  background:color-mix(in srgb,var(--ink) 46%,transparent);backdrop-filter:blur(4px);animation:fade .2s both}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet .card{max-width:440px;width:100%;text-align:center;animation:rise .34s cubic-bezier(.2,.8,.3,1) both}
.chestbig{font-size:70px;line-height:1;animation:shake .9s ease-in-out}
@keyframes shake{0%,100%{transform:rotate(0)}20%{transform:rotate(-9deg)}40%{transform:rotate(9deg)}60%{transform:rotate(-5deg)}80%{transform:rotate(5deg)}}
.res{text-align:center;padding:8px 0}
.res .big{font-family:var(--display);font-size:62px;line-height:1.1;color:var(--honey2)}
.starsbig{font-size:44px;letter-spacing:8px;color:var(--honey);margin:6px 0}
.starsbig .off{color:var(--line)}
.tbl{max-height:58vh;overflow:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--card)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{text-align:start;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
th{position:sticky;top:0;background:var(--paper2);color:var(--ink2);font-weight:700}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:10px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px 15px}
.stat b{display:block;font-family:var(--display);font-size:27px;line-height:1.2}
.stat.warn b{color:var(--pom)}
input[type=text],input[type=number],select{
  font-family:inherit;font-size:16px;background:var(--card);color:var(--ink);
  border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 13px;min-width:0
}
input:focus-visible,select:focus-visible{outline:3px solid var(--honey);outline-offset:2px}
.nav{position:fixed;inset-inline:0;bottom:0;z-index:50;background:color-mix(in srgb,var(--paper) 92%,transparent);
  backdrop-filter:blur(10px);border-top:1px solid var(--line)}
.nav-in{max-width:980px;margin:0 auto;display:flex}
.nav button{flex:1;padding:9px 4px 11px;font-size:12px;font-weight:700;color:var(--ink3);display:grid;gap:2px;justify-items:center}
.nav button .ic{font-size:20px;line-height:1}
.nav button[aria-current="true"]{color:var(--honey2)}

@media (max-width:640px){

})();

/* ---------- 1.3 sound (مولَّدٌ برمجيًّا — صفرُ ملفّاتِ صوت) ----------
   عندَ الدمج: استبدلْ tone() بمشغّلِ ملفّاتٍ محلّيّة assets/sfx/*.m4a  */
const SFX = (() => {
  let ctx = null;
  const ensure = () => { try { ctx = ctx || new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { ctx = null; } return ctx; };
  const tone = (f, dur, type, vol) => {
    if (!P || !P.s.sound) return; const c = ensure(); if (!c) return;
    try {
      const o = c.createOscillator(), g = c.createGain();
      o.type = type || "sine"; o.frequency.value = f;
      o.connect(g); g.connect(c.destination);
      const t = c.currentTime; g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(vol || 0.07, t + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.start(t); o.stop(t + dur + 0.03);
    } catch (e) { }
  };
  return {
    good() { tone(660, .14); setTimeout(() => tone(880, .2), 95); },
    bad() { tone(196, .24, "triangle", .06); },
    coin() { tone(1180, .07, "square", .04); setTimeout(() => tone(1560, .09, "square", .035), 70); },
    chest() {[523, 659, 784, 1046].forEach((f, i) => setTimeout(() => tone(f, .22), i * 95)); },
    flip() { tone(520, .05, "square", .03); },
    tick() { tone(430, .04, "square", .025); }
  };
})();

/* ---------- 1.4 data layer ---------- */
const Data = {
  bank: null, world: null, rewards: null, cats: {}, regions: {}, qByCat: {},

  async load() {
    this.bank = await loadJSON("trivia-golden.json", "bank");
    this.world = await loadJSON("world.json", "world");
    this.rewards = await loadJSON("rewards.json", "rewards");
    this.index();
  },
  index() {
    this.cats = {}; (this.bank.categories || []).forEach(c => this.cats[c.id] = c);
    this.qByCat = {};
    (this.bank.questions || []).forEach(q => (this.qByCat[q.cat] = this.qByCat[q.cat] || []).push(q));
    this.regions = {};
    (this.world.worlds || []).forEach(w => (w.regions || []).forEach(r => { r.world = w.id; this.regions[r.id] = r; }));
  },
  setBank(json) { this.bank = json; this.index(); },
  points(d) { return (this.bank.difficultyPoints || {})[d] || (this.bank.difficultyPoints || {})[String(d)] || 0; },
  catName(id) { return (this.cats[id] && this.cats[id].name) || id; },
  catGroup(id) { return (this.cats[id] && this.cats[id].group) || ""; },

  /* كلُّ أسئلةِ الإقليم بعدَ مرشِّحِ العمرِ والحالة — مرتَّبةٌ ثابتًا ليبقى ترتيبُ المحطّاتِ مستقرًّا */
  regionQuestions(rid) {
    const r = this.regions[rid]; if (!r) return [];
    if (r.gen) return [];                                     /* أقاليمُ التوليدِ لا بنكَ لها */
    const out = [];
    (r.cats || []).forEach(c => (this.qByCat[c] || []).forEach(q => { if (P.allowsBand(q.band) && P.allowsStatus(q.status)) out.push(q); }));
    return out.sort((a, b) => a.id < b.id ? -1 : a.id > b.id ? 1 : 0);
  },
  stations(rid) {
    const r = this.regions[rid], d = this.world.defaults || {};
    const size = r.stationSize || d.stationSize || 6;
    if (r.gen) return Array.from({ length: 8 }, (_, i) => ({ index: i, gen: r.gen, size, diff: 1 + Math.floor(i / 3) }));
    const qs = this.regionQuestions(rid), out = [];
    for (let i = 0; i < qs.length; i += size) out.push({ index: out.length, list: qs.slice(i, i + size), size });
    return out.slice(0, r.maxStations || d.maxStations || 14);
  },
  /* عيّنةٌ عامّةٌ لأوضاعِ السرعة/اليوميّ/الفِرَق */
  sample(filter, n, rnd) {
    let qs = (this.bank.questions || []).filter(q => P.allowsBand(q.band) && P.allowsStatus(q.status));
    if (filter) qs = qs.filter(filter);
    return shuffle(qs, rnd).slice(0, n);
  }
};
/* يُجرَّبُ المجلّدُ المجاورُ أوّلًا ثمّ الملفُّ المجاورُ ثمّ النسخةُ المدموجة.
   فائدتُه: زيادةُ الأسئلةِ على الخادمِ = استبدالُ ملفِّ JSON واحدٍ بلا إعادةِ بناء. */
const DATA_DIR = "./quest-data/";
async function loadJSON(file, embedId) {
  for (const url of [DATA_DIR + file, "./" + file]) {
    try { const r = await fetch(url, { cache: "no-store" }); if (r.ok) return await r.json(); } catch (e) { }
  }
  return JSON.parse(document.getElementById(embedId).textContent);
}

/* ---------- 1.5 procedural generators (صفرُ محتوًى مخزَّن) ---------- */
const GENERATORS = {
  math(band, diff, seed) {
    const rnd = seed ? seeded(seed) : Math.random;
    const ri = (a, b) => a + Math.floor(rnd() * (b - a + 1));
    let a, b, op, val, q;
    if (diff === 1) { a = ri(2, band === "young" ? 12 : 30); b = ri(2, band === "young" ? 9 : 20); op = rnd() < .5 ? "+" : "−"; if (op === "−" && b > a) [a, b] = [b, a]; val = op === "+" ? a + b : a - b; }
    else if (diff === 2) { a = ri(2, 12); b = ri(2, 12); op = "×"; val = a * b; }
    else { b = ri(3, 12); val = ri(3, 12); a = b * val; op = "÷"; }
    q = ar(a) + " " + op + " " + ar(b) + " = ؟";
    const set = new Set([val]);
    while (set.size < 4) { const d = val + (ri(1, 6) * (rnd() < .5 ? -1 : 1)); if (d >= 0) set.add(d); }
    const choices = shuffle(Array.from(set), rnd).map(ar);
    return {
      id: "math-" + Date.now() + "-" + Math.floor(rnd() * 9999), cat: "math", band: band, diff: diff, type: "mcq",
      q: q, choices: choices, answer: choices.indexOf(ar(val)),
      why: "الناتجُ " + ar(val) + ".", status: "approved", generated: true
    };
  }
};

/* ---------- 1.6 progress ---------- */
const BAND_ORDER = { young: 0, teen: 1, adult: 2 };
const P = {
  KEY: "murabbi.quest.v1",
  s: null,
  fresh() {
    return {
      v: 1, xp: 0, coins: 0, coinsEarned: 0,
      stars: {},                 /* "region:stationIndex" -> 0..3 */
      correctTotal: 0, wrongTotal: 0, stationsDone: 0, perfectStations: 0,
      streak: 0, lastDay: null, dailyDone: 0, lastDaily: null, speedBest: 0,
      badges: [], titles: [], title: null, themes: ["sand"], theme: "sand",
      collection: [], seen: [],
      band: "teen", allowDrafts: true, sound: true
    };
  },
  load() { this.s = Object.assign(this.fresh(), Store.get(this.KEY, {})); },
  save() { Store.set(this.KEY, this.s); },
  reset() { this.s = this.fresh(); this.save(); },

  allowsBand(b) { return (BAND_ORDER[b] == null) || BAND_ORDER[b] <= BAND_ORDER[this.s.band]; },
  allowsStatus(st) { return st === "approved" || this.s.allowDrafts; },

  /* level */
  level() {
    const curve = Data.rewards.levelCurve, step = Data.rewards.levelStep || 1000;
    let lv = 1; for (let i = 0; i < curve.length; i++) if (this.s.xp >= curve[i]) lv = i + 1;
    if (this.s.xp >= curve[curve.length - 1]) lv = curve.length + Math.floor((this.s.xp - curve[curve.length - 1]) / step);
    return lv;
  },
  levelFloor(lv) { const c = Data.rewards.levelCurve, st = Data.rewards.levelStep || 1000; return lv - 1 < c.length ? c[lv - 1] : c[c.length - 1] + (lv - c.length) * st; },
  levelPct() { const lv = this.level(), a = this.levelFloor(lv), b = this.levelFloor(lv + 1); return clamp(Math.round((this.s.xp - a) / Math.max(1, b - a) * 100), 0, 100); },

  starsTotal() { return Object.values(this.s.stars).reduce((a, b) => a + b, 0); },
  regionStars(rid) { return Object.keys(this.s.stars).filter(k => k.split(":")[0] === rid).reduce((a, k) => a + this.s.stars[k], 0); },
  regionDone(rid) { const st = Data.stations(rid); return st.length > 0 && st.every(s => (this.s.stars[rid + ":" + s.index] || 0) > 0); },
  regionsDone() { return Object.keys(Data.regions).filter(r => this.regionDone(r)).length; },
  regionPct(rid) { const st = Data.stations(rid); if (!st.length) return 0; const got = st.filter(s => (this.s.stars[rid + ":" + s.index] || 0) > 0).length; return Math.round(got / st.length * 100); },
  unlocked(rid) {
    const r = Data.regions[rid]; if (!r) return false;
    const need = r.unlock || {};
    if (need.stars != null && this.starsTotal() < need.stars) return false;
    if (need.level != null && this.level() < need.level) return false;
    return true;
  },

  /* economy */
  addXP(n) { this.s.xp += n; },
  addCoins(n) { this.s.coins += n; this.s.coinsEarned += n; },
  spend(n) { if (this.s.coins < n) return false; this.s.coins -= n; return true; },
  collect(q) {
    if (!q || q.generated || !q.why) return;
    if (this.s.collection.some(c => c.id === q.id)) return;
    const text = q.q || q.verse || (q.left ? "مطابقة: " + q.left.join(" · ") : "");
    this.s.collection.push({ id: q.id, cat: q.cat, q: text, why: q.why, src: q.src || "" });
  },
  /* مشتقّاتٌ من خريطةِ النجوم — لا عدّاداتٍ تتضاعفُ بالإعادة */
  stationsDone() { return Object.keys(this.s.stars).filter(k => this.s.stars[k] > 0).length; },
  perfectStations() { return Object.keys(this.s.stars).filter(k => this.s.stars[k] === 3).length; },
  markStation(rid, idx, stars) {
    const k = rid + ":" + idx;
    if (stars > (this.s.stars[k] || 0)) this.s.stars[k] = stars;
  },
  touchDay() {
    const t = dayKey();
    if (this.s.lastDay === t) return;
    const gap = this.s.lastDay ? daysBetween(this.s.lastDay, t) : 99;
    this.s.streak = gap === 1 ? this.s.streak + 1 : 1;
    this.s.lastDay = t;
  }
};

/* ---------- 1.7 rewards engine (شرطٌ واحدٌ لكلِّ الأنواع) ---------- */
const Rewards = {
  snapshot() {
    return {
      level: P.level(), starsTotal: P.starsTotal(), correctTotal: P.s.correctTotal,
      perfectStations: P.perfectStations(), stationsDone: P.stationsDone(),
      regionsDone: P.regionsDone(), streak: P.s.streak, speedBest: P.s.speedBest,
      dailyDone: P.s.dailyDone, collection: P.s.collection.length,
      coins: P.s.coins, coinsEarned: P.s.coinsEarned
    };
  },
  meets(need, snap) { return Object.keys(need || {}).every(k => (snap[k] || 0) >= need[k]); },
  /* يُستدعى بعدَ كلِّ حدث — يُرجعُ قائمةَ ما فُتحَ الآنَ للعرض */
  check() {
    const snap = this.snapshot(), out = [];
    (Data.rewards.badges || []).forEach(b => {
      if (P.s.badges.indexOf(b.id) < 0 && this.meets(b.need, snap)) { P.s.badges.push(b.id); out.push({ kind: "badge", it: b }); }
    });
    (Data.rewards.titles || []).forEach(t => {
      if (P.s.titles.indexOf(t.id) < 0 && this.meets(t.need, snap)) { P.s.titles.push(t.id); out.push({ kind: "title", it: t }); if (!P.s.title) P.s.title = t.id; }
    });
    (Data.rewards.themes || []).forEach(t => {
      const free = !t.cost && this.meets(t.need, snap);
      if (P.s.themes.indexOf(t.id) < 0 && free) { P.s.themes.push(t.id); out.push({ kind: "theme", it: t }); }
    });
    (Data.rewards.achievements || []).forEach(a => {
      if (P.s.badges.indexOf("ach:" + a.id) < 0 && this.meets(a.need, snap)) {
        P.s.badges.push("ach:" + a.id);
        if (a.reward) { P.addCoins(a.reward.coins || 0); P.addXP(a.reward.xp || 0); }
        out.push({ kind: "achievement", it: a });
      }
    });
    P.save();
    return out;
  },
  openChest(kind) {
    const c = (Data.rewards.chests || {})[kind]; if (!c) return null;
    P.addCoins(c.coins || 0); P.addXP(c.xp || 0); P.save();
    return c;
  }
};

/* ---------- 1.8 themes ---------- */
const Theme = {
  apply(id) {
    const t = (Data.rewards.themes || []).find(x => x.id === id) || (Data.rewards.themes || [])[0];
    document.documentElement.removeAttribute("style");
    Object.keys((t && t.tokens) || {}).forEach(k => document.documentElement.style.setProperty(k, t.tokens[k]));
    P.s.theme = t ? t.id : "sand"; P.save();
  }
};


/* ---------- 1.9 البلاغات ----------
   المُجرِّبُ يضغطُ «إبلاغ» على أيِّ سؤالٍ فيُحفَظُ محلّيًّا مع مُعرِّفِ السؤال،
   ثمّ يَنسخُ ويُرسلُ. النسخةُ العامّةُ لاحقًا: بدِّلْ Reports.send فقط. */
const REPORT_REASONS = ["الإجابةُ خطأ", "خطأٌ إملائيّ", "المصدرُ غيرُ دقيق", "غيرُ مناسبٍ للعمر", "السؤالُ غيرُ واضح", "غيرُ ذلك"];
const Reports = {
  KEY: "murabbi.quest.reports",
  all() { return Store.get(this.KEY, []); },
  add(q, reason, note) {
    const list = this.all();
    const rec = {
      at: new Date().toISOString().slice(0, 16).replace("T", " "),
      id: q.id || "?", cat: q.cat || "", type: q.type || "", diff: q.diff || 0,
      reason: reason, note: (note || "").slice(0, 400),
      q: String(q.q || q.verse || "").slice(0, 100)
    };
    list.push(rec); Store.set(this.KEY, list);
    try { this.send(rec); } catch (e) { }
    return list.length;
  },
  /* المقبسُ الوحيدُ الذي يتغيّرُ في النسخةِ العامّة:
     fetch("/api/quest-report", {method:"POST", body: JSON.stringify(rec)}) */
  send(rec) { },
  text() {
    const list = this.all();
    if (!list.length) return "لا بلاغات.";
    return "بلاغاتُ رحلةِ الكنوز (" + ar(list.length) + ")\n" + list.map((r, i) =>
      ar(i + 1) + ") " + r.id + " · " + r.reason + "\n   " + r.q + (r.note ? "\n   ملاحظة: " + r.note : "")
    ).join("\n");
  },
  clear() { Store.set(this.KEY, []); }
};

/* ---------- 1.10 سجلُّ الأخطاءِ على الشاشة ----------
   الهاتفُ لا أدواتِ مطوّرٍ فيه، فتظهرُ الأخطاءُ هنا بدلَ الصمت.
   عندَ النشرِ للأطفال: احذفْ هذا القسمَ أو اربطْه براية debug. */
const ErrLog = {
  items: [], node: null, open: false,
  push(kind, msg, where) {
    this.items.push(kind + ": " + msg + (where ? "   @ " + where : ""));
    try { this.draw(); } catch (e) { }
  },
  draw() {
    if (!document.body) return;
    if (!this.node) { this.node = document.createElement("div"); this.node.className = "errbar"; document.body.appendChild(this.node); }
    const n = this.items.length;
    this.node.innerHTML = "";
    const head = document.createElement("button");
    head.className = "errhead";
    head.textContent = "⚠ " + ar(n) + (n === 1 ? " خطأ" : " أخطاء") + " — اضغطْ للتفاصيل";
    const body = document.createElement("div");
    body.className = "errbody"; body.style.display = this.open ? "block" : "none";
    body.textContent = this.items.join("\n");
    head.onclick = () => { this.open = !this.open; body.style.display = this.open ? "block" : "none"; };
    const tools = document.createElement("div"); tools.className = "errtools";
    const cp = document.createElement("button"); cp.textContent = "انسخِ الكلّ";
    cp.onclick = () => { try { navigator.clipboard.writeText(this.items.join("\n")); cp.textContent = "نُسِخ"; } catch (e) { cp.textContent = "تعذّر"; } };
    const cl = document.createElement("button"); cl.textContent = "أخفِ";
    cl.onclick = () => { this.node.remove(); this.node = null; };
    tools.appendChild(cp); tools.appendChild(cl);
    this.node.appendChild(head); this.node.appendChild(body); this.node.appendChild(tools);
  }
};
window.addEventListener("error", e => ErrLog.push("خطأ", e.message || "?", String(e.filename || "").split("/").pop() + ":" + (e.lineno || 0)));
window.addEventListener("unhandledrejection", e => ErrLog.push("وعدٌ مرفوض", String((e.reason && e.reason.message) || e.reason || "?"), ""));

</script>
<script>
/* ==========================================================
   MODULE 2 — QUESTION RENDERERS
   سجلٌّ واحدٌ لكلِّ نوعٍ من الأسئلة. إضافةُ آليّةٍ جديدة =
   إضافةُ مُدخَلٍ واحدٍ في RENDERERS — بلا مساسٍ بالشاشات.
   ========================================================== */

const TYPE_LABEL = { mcq: "اختيارٌ من متعدّد", tf: "صحٌّ أم خطأ", complete: "أكمِلْ", order: "رتّبْ", match: "طابِقْ", memory: "بطاقاتُ الذاكرة" };
const BAND_LABEL = { young: "صغار", teen: "يافعون", adult: "كبار" };
const DIFF_LABEL = { 1: "سهل", 2: "متوسّط", 3: "صعب" };
const HADITH_RE = /حديث|رواه|مسلم|البخاري|الترمذي|أبو داود|النسائي|ابن ماجه|متّفَق/;

const Q = {
  /* تهيئةُ العرض: كلُّ بعثرةٍ تحصلُ هنا مرّةً واحدة.
     ⚠️ إجباريّ: أجوبةُ order/match مخزَّنةٌ متسلسلةً [0,1,2,3] —
     عرضُها بترتيبِ التخزينِ يكشفُ الإجابة. */
  present(q) {
    const p = { q, type: q.type };
    if (q.type === "mcq") p.opts = shuffle((q.choices || []).map((t, i) => ({ t, ok: i === q.answer })));
    else if (q.type === "complete") p.opts = shuffle((q.bank || []).map((t, i) => ({ t, ok: i === q.answer })));
    else if (q.type === "tf") p.opts = [{ t: "صح", ok: q.answer === true }, { t: "خطأ", ok: q.answer === false }];
    else if (q.type === "order") { p.correct = (q.answer || []).map(i => (q.items || [])[i]); p.shuf = shuffle(q.items || []); }
    else if (q.type === "match") { p.left = q.left || []; p.right = q.right || []; p.rshuf = shuffle(p.right.map((t, i) => ({ t, i }))); }
    else if (q.type === "memory") { p.pairs = q.pairs || []; }
    return p;
  },

  label(q) {
    if (q.type === "complete") return HADITH_RE.test(String(q.src || "")) ? "أكمِلِ الحديث" : "أكمِلِ الآية";
    return TYPE_LABEL[q.type] || q.type;
  },

  answerText(p) {
    const q = p.q;
    if (q.type === "mcq") return (q.choices || [])[q.answer];
    if (q.type === "complete") return (q.bank || [])[q.answer];
    if (q.type === "tf") return q.answer ? "صح" : "خطأ";
    if (q.type === "order") return p.correct.join("  ←  ");
    if (q.type === "match") return p.left.map((l, i) => l + " ← " + p.right[(q.a || [])[i]]).join("  ·  ");
    if (q.type === "memory") return "طابِقِ البطاقاتِ كلَّها";
    return "—";
  },

  /* شريطُ البياناتِ فوقَ السؤال — يُظهرُ حالةَ المراجعةِ دائمًا */
  meta(q, full) {
    const m = el("div", "qmeta");
    m.appendChild(el("span", "tag gold", Q.label(q)));
    if (q.cat) m.appendChild(el("span", "tag", Data.catName(q.cat)));
    m.appendChild(el("span", "tag", DIFF_LABEL[q.diff] || ""));
    if (full) {
      if (q.band) m.appendChild(el("span", "tag", BAND_LABEL[q.band] || q.band));
      if (q.id) m.appendChild(el("span", "tag", q.id));
      if (q.src) m.appendChild(el("span", "tag" + (/يُراجَع/.test(q.src) ? " warn" : ""), q.src));
      if (q.status && q.status !== "approved") m.appendChild(el("span", "tag warn", "مسوّدة"));
    }
    return m;
  },

  /* المتن: النصُّ أو الآيةُ فقط — يُستعمَلُ في وضعِ الفِرَقِ بلا خيارات */
  stem(p) {
    const q = p.q, box = document.createElement("div");
    if (q.type === "complete") {
      const v = el("div", "verse"); v.textContent = (q.verse || "") + " ";
      const b = el("span", "blank"); b.innerHTML = "&nbsp;"; v.appendChild(b);
      box.appendChild(v);
    } else if (q.type === "match") {
      box.appendChild(el("h2", "qtext", q.q || "طابِقْ بينَ العمودَين"));
    } else if (q.type === "memory") {
      box.appendChild(el("h2", "qtext", "اقلِبِ البطاقاتِ وطابِقْ بينَ كلِّ اثنتَين"));
    } else {
      box.appendChild(el("h2", "qtext", q.q || ""));
    }
    return box;
  },

  /* الجسمُ التفاعليّ. done(ok) تُستدعى مرّةً واحدةً فقط. */
  body(p, done) {
    const r = RENDERERS[p.type] || RENDERERS.unsupported;
    return r(p, done);
  }
};

const RENDERERS = {
  /* ---- اختيارٌ من متعدّد · صح/خطأ · أكمِل ---- */
  mcq(p, done) { return choiceBody(p, done, "choices"); },
  complete(p, done) { return choiceBody(p, done, "choices"); },
  tf(p, done) { return choiceBody(p, done, "choices tf"); },

  /* ---- ترتيب: سحبٌ وإفلات + أسهم ---- */
  order(p, done) {
    const box = document.createElement("div");
    const list = el("div", "orderlist");
    let arr = p.shuf.slice();
    const paint = () => {
      list.innerHTML = "";
      arr.forEach((t, i) => {

        const up = el("button", null, "▲"); up.type = "button"; up.setAttribute("aria-label", "أعلى");
        up.onclick = () => { if (i > 0) { [arr[i - 1], arr[i]] = [arr[i], arr[i - 1]]; paint(); } };
        const dn = el("button", null, "▼"); dn.type = "button"; dn.setAttribute("aria-label", "أسفل");
        dn.onclick = () => { if (i < arr.length - 1) { [arr[i + 1], arr[i]] = [arr[i], arr[i + 1]]; paint(); } };
        mv.appendChild(up); mv.appendChild(dn); it.appendChild(mv);
        list.appendChild(it);
      });
    };
    paint();
    sortable(list, () => { arr = Array.from(list.children).map(n => n.dataset.t); paint(); });
    box.appendChild(list);
    const go = el("button", "btn primary wide", "تحقّقْ"); go.style.marginTop = "16px";
    go.onclick = () => {
      const ok = arr.join("|") === p.correct.join("|");
      Array.from(list.children).forEach((n, i) => n.classList.add(arr[i] === p.correct[i] ? "ok" : "bad"));
      list.querySelectorAll("button").forEach(b => b.disabled = true);
      go.disabled = true; done(ok);
    };
    box.appendChild(go);
    return box;
  },

  /* ---- مطابقة: اختَرْ من اليمينِ ثمّ من اليسار ---- */
  match(p, done) {
    const box = document.createElement("div");
    const cols = el("div", "mcols");
    const L = el("div", "mcol"), R = el("div", "mcol");
    const picked = p.left.map(() => -1);
    let sel = -1;
    const lnodes = [], rnodes = [];
    p.left.forEach((t, i) => {
      const n = el("button", "mside", t); n.type = "button";
      n.onclick = () => { sel = i; lnodes.forEach((x, j) => x.classList.toggle("pick", j === i)); };
      lnodes.push(n); L.appendChild(n);
    });
    p.rshuf.forEach(o => {
      const n = el("button", "mside", o.t); n.type = "button";
      n.onclick = () => {
        if (sel < 0) return;
        picked[sel] = o.i;
        lnodes[sel].textContent = p.left[sel] + "  ←  " + o.t;
        lnodes[sel].classList.remove("pick");
        n.disabled = true; n.style.opacity = ".45";
        sel = -1;
        go.disabled = picked.some(v => v < 0);
      };
      rnodes.push(n); R.appendChild(n);
    });
    cols.appendChild(L); cols.appendChild(R); box.appendChild(cols);
    box.appendChild(h("div", "tiny", "اضغطْ عنصرًا من العمودِ الأوّلِ ثمّ ما يقابلُه من الثاني."));
    const go = el("button", "btn primary wide", "تحقّقْ"); go.style.marginTop = "16px"; go.disabled = true;
    go.onclick = () => {
      const key = p.q.a || [];
      const ok = picked.every((v, i) => v === key[i]);
      lnodes.forEach((n, i) => n.classList.add(picked[i] === key[i] ? "ok" : "bad"));
      rnodes.forEach(n => n.disabled = true);
      go.disabled = true; done(ok);
    };
    box.appendChild(go);
    return box;
  },

  /* ---- بطاقاتُ الذاكرة ---- */
  memory(p, done) {
    const box = document.createElement("div");
    const cards = [];
    p.pairs.forEach((pr, i) => { cards.push({ k: i, t: pr[0] }); cards.push({ k: i, t: pr[1] }); });
    const deck = shuffle(cards);
    const grid = el("div", "memgrid");
    let open = [], found = 0, lock = false, misses = 0;
    deck.forEach(c => {
      const n = el("button", "mcard"); n.type = "button";
      n.appendChild(h("span", "back", "۞"));
      n.appendChild(el("span", "face", c.t));
      n.onclick = () => {
        if (lock || n.classList.contains("up") || n.classList.contains("done")) return;
        n.classList.add("up"); SFX.flip(); open.push({ c, n });
        if (open.length === 2) {
          lock = true;
          const [a, b] = open;
          if (a.c.k === b.c.k && a.n !== b.n) {
            setTimeout(() => {
              a.n.classList.add("done"); b.n.classList.add("done");
              a.n.classList.remove("up"); b.n.classList.remove("up");
              open = []; lock = false; found++;
              if (found === p.pairs.length) done(misses <= p.pairs.length);
            }, 380);
          } else {
            misses++;
            setTimeout(() => { a.n.classList.remove("up"); b.n.classList.remove("up"); open = []; lock = false; }, 780);
          }
        }
      };
      grid.appendChild(n);
    });
    box.appendChild(grid);
    return box;
  },

  unsupported(p, done) {
    const box = document.createElement("div");
    box.appendChild(h("div", "verdict", "نوعُ السؤال «" + p.type + "» غيرُ مسجَّلٍ في RENDERERS."));
    const b = el("button", "btn wide", "تجاوز"); b.onclick = () => done(false); box.appendChild(b);
    return box;
  }
};

function choiceBody(p, done, cls) {
  const g = el("div", cls);
  const keys = ["أ", "ب", "ج", "د", "هـ", "و"];
  p.opts.forEach((o, i) => {
    const b = el("button", "choice"); b.type = "button";
    if (cls.indexOf("tf") < 0) b.appendChild(el("span", "k", keys[i] || ar(i + 1)));
    b.appendChild(el("span", null, o.t));
    b.onclick = () => {
      Array.from(g.children).forEach((c, j) => { c.disabled = true; if (p.opts[j].ok) c.classList.add("ok"); });
      if (!o.ok) b.classList.add("bad");
      done(!!o.ok);
    };
    g.appendChild(b);
  });
  return g;
}

/* سحبٌ وإفلاتٌ يعملُ باللمسِ والفأرةِ معًا */
function sortable(list, onChange) {
  let dragging = null;
  list.addEventListener("pointerdown", e => {
    const hnd = e.target.closest(".hand"); if (!hnd) return;
    dragging = hnd.closest(".oitem"); if (!dragging) return;
    dragging.classList.add("drag");
    try { dragging.setPointerCapture(e.pointerId); } catch (x) { }
    e.preventDefault();
  });
  list.addEventListener("pointermove", e => {
    if (!dragging) return;
    const kids = Array.from(list.children);
    for (const it of kids) {
      if (it === dragging) continue;
      const r = it.getBoundingClientRect();
      if (e.clientY > r.top && e.clientY < r.bottom) {
        const from = kids.indexOf(dragging), to = kids.indexOf(it);
        if (from < to) it.after(dragging); else it.before(dragging);
        break;
      }
    }
  });
  const end = () => { if (!dragging) return; dragging.classList.remove("drag"); dragging = null; onChange(); };
  list.addEventListener("pointerup", end);
  list.addEventListener("pointercancel", end);
}

/* اشتقاقُ لوحِ الذاكرةِ من محتوًى موجود — بلا أيِّ محتوًى جديد */
function buildMemory(questions, n) {
  const pairs = [];
  questions.forEach(q => {
    if (q.type === "match") (q.left || []).forEach((l, i) => { const r = (q.right || [])[(q.a || [])[i]]; if (l && r) pairs.push([l, r]); });
  });
  if (pairs.length < (n || 6)) {
    questions.forEach(q => {
      if (q.type === "mcq") { const a = (q.choices || [])[q.answer]; if (q.q && a && a.length <= 22 && q.q.length <= 62) pairs.push([q.q, a]); }
    });
  }
  const take = shuffle(pairs).slice(0, n || 6);
  return take.length >= 3 ? { id: "memory-" + Date.now(), type: "memory", cat: (questions[0] || {}).cat, diff: 2, band: "young", pairs: take, why: "المطابقةُ تثبّتُ المعلومةَ في الذاكرة.", status: "approved", generated: true } : null;
}

    });

  /* ---------- 3.5 speed ---------- */
  speed() {

  /* ---------- 3.6 teams — «دربُ القافلة» ----------
     لا لوحةَ فئاتٍ ولا سُلَّمَ قيَم. الفريقُ يختارُ إقليمًا فقط،
     والصعوبةُ تُكشَفُ مع السؤال، والجائزةُ خطواتٌ على درب. */
  teamsSetup() {
    const T0 = Data.rewards.teams || {};
    const v = document.createElement("div");
    v.appendChild(el("div", "eyebrow", "وضعُ الفِرَق"));
    v.appendChild(el("h1", null, "تحدّي العائلةِ والفِرَق"));
    v.appendChild(el("div", "muted", "دربُ القافلة — كلُّ إجابةٍ تُقدّمُ قافلتَكم خطوات، وأوّلُ من يبلغُ الكنزَ يفوز."));

    const c = el("div", "card"); c.style.marginTop = "14px";
    let n = 2, total = T0.defaultQuestions || 15;
    const defs = ["الفريقُ الأوّل", "الفريقُ الثاني", "الفريقُ الثالث", "الفريقُ الرابع"];
    const inputs = [], rows = document.createElement("div");
    const draw = () => {
      rows.innerHTML = "";
      for (let i = 0; i < n; i++) {
        const row = el("div", "row"); row.style.alignItems = "center"; row.style.marginTop = "10px";
        const d = el("span", "dot"); d.style.background = TEAM_COLORS[i]; row.appendChild(d);
        const inp = document.createElement("input"); inp.type = "text"; inp.maxLength = 22;
        inp.value = inputs[i] ? inputs[i].value : defs[i]; inp.style.flex = "1";
        inputs[i] = inp; row.appendChild(inp); rows.appendChild(row);
      }
      inputs.length = n;
    };
    const pick = el("div", "chips");
    [2, 3, 4].forEach(k => {
      const b = el("button", "chip", ar(k) + " فِرَق"); b.type = "button";
      b.setAttribute("aria-pressed", String(k === n));
      b.onclick = () => { n = k; Array.from(pick.children).forEach((x, j) => x.setAttribute("aria-pressed", String([2, 3, 4][j] === n))); draw(); };
      pick.appendChild(b);
    });
    c.appendChild(el("div", "tiny", "عددُ الفِرَق")); c.appendChild(pick); c.appendChild(rows); draw();

    /* عددُ الأسئلة — الطلبُ الصريح */
    c.appendChild(h("div", "tiny", "عددُ الأسئلة")).style.marginTop = "16px";
    const qn = el("div", "chips");
    const custom = document.createElement("input");
    custom.type = "number"; custom.min = 4; custom.max = 120; custom.value = total; custom.style.width = "88px";
    const syncQ = () => Array.from(qn.children).forEach((x, j) => x.setAttribute("aria-pressed", String((T0.questionOptions || [])[j] === total)));
    (T0.questionOptions || [10, 15, 20, 30]).forEach(k => {
      const b = el("button", "chip", ar(k)); b.type = "button";
      b.onclick = () => { total = k; custom.value = k; syncQ(); };
      qn.appendChild(b);
    });
    custom.oninput = () => { total = clamp(+custom.value || 4, 4, 120); syncQ(); };
    syncQ(); qn.appendChild(custom); c.appendChild(qn);

    const secs = document.createElement("input");
    secs.type = "number"; secs.value = T0.defaultSeconds || 30; secs.min = 5; secs.max = 180; secs.style.width = "88px";
    const sr = el("div", "row"); sr.style.marginTop = "16px"; sr.style.alignItems = "center";
    sr.appendChild(el("span", "tiny", "وقتُ السؤال (ثانية)")); sr.appendChild(secs); c.appendChild(sr);

    const go = el("button", "btn primary wide", "انطلقتِ القافلة"); go.style.marginTop = "18px";
    go.onclick = () => {
      const target = Math.max(T0.minTarget || 8, Math.ceil(total * (T0.trackFactor || 1.2)));
      Screens.teamsTrack({
        names: inputs.slice(0, n).map((x, i) => (x.value || defs[i]).trim() || defs[i]),
        steps: new Array(n).fill(0), turn: 0, used: new Set(),
        total: total, asked: 0, target: target, secs: Math.max(5, +secs.value || 30)
      });
    };
    c.appendChild(go); v.appendChild(c);
    mount(v, "challenge");
  },

  teamsTrack(T) {
    Timer.stop();
    const won = T.steps.findIndex(s => s >= T.target);
    if (won >= 0 || T.asked >= T.total) return Screens.teamsEnd(T);

    const v = document.createElement("div");
    const top = el("div", "row"); top.style.alignItems = "center";
    top.appendChild(h("span", "pill", "السؤال " + ar(T.asked + 1) + " / " + ar(T.total)));
    top.appendChild(el("div", "grow"));
    top.appendChild(h("span", "pill", "🧰 الكنزُ عندَ " + ar(T.target)));
    v.appendChild(top);

    const track = el("div", "track");
    T.names.forEach((nm, i) => {
      const row = el("div", "trow" + (i === T.turn ? " turn" : ""));
      const th = el("div", "th");
      const d = el("span", "dot"); d.style.background = TEAM_COLORS[i]; th.appendChild(d);
      th.appendChild(el("b", null, nm));
      th.appendChild(el("span", "n", ar(T.steps[i])));
      row.appendChild(th);
      const path = el("div", "path");
      for (let s = 0; s <= T.target; s++) {
        if (s === T.steps[i]) { const m = el("span", "dotp here", "🐪"); path.appendChild(m); }
        else { const dot = el("span", "dotp" + (s < T.steps[i] ? " done" : "")); path.appendChild(dot); }
      }
      path.appendChild(el("span", "dotp goal", "🧰"));
      row.appendChild(path);
      track.appendChild(row);
    });
    v.appendChild(track);

    v.appendChild(h("div", "tiny", "الدورُ على <b>" + T.names[T.turn] + "</b> — اختاروا إقليمًا. الصعوبةُ تُكشَفُ مع السؤال: سهلٌ خطوة، متوسّطٌ خطوتان، صعبٌ ثلاث. ومن خطفَ الإجابةَ من غيرِ صاحبِ الدورِ تقدّمَ خطوةً واحدة."));

    const grid = el("div", "pickgrid");
    Object.values(Data.regions).filter(r => !r.gen && P.unlocked(r.id)).forEach(r => {
      const left = Data.regionQuestions(r.id).filter(q => !T.used.has(q.id));
      const b = el("button", "pickcard"); b.type = "button";
      b.appendChild(medal(r, false));
      b.appendChild(el("b", null, r.name));
      b.appendChild(el("span", null, left.length ? ar(left.length) + " سؤالًا" : "نفدت"));
      if (!left.length) b.disabled = true; else b.onclick = () => Screens.teamsAsk(T, r, left);
      grid.appendChild(b);
    });
    v.appendChild(grid);

    const row = el("div", "row"); row.style.marginTop = "18px";
    const end = el("button", "btn quiet", "أنهِ اللعبةَ الآن"); end.onclick = () => Screens.teamsEnd(T);
    row.appendChild(end); v.appendChild(row);
    mount(v, "challenge");
  },

  teamsAsk(T, r, avail) {
    const q = avail[Math.floor(Math.random() * avail.length)];
    T.used.add(q.id);
    const steps = (Data.rewards.teams.stepsPerDiff || {})[q.diff] || 1;
    const stealSteps = Data.rewards.teams.stealSteps || 1;
    const p = Q.present(q);

    const v = document.createElement("div");
    const top = el("div", "playtop");
    top.appendChild(h("div", "tiny", "<b>" + r.name + "</b> · الدورُ على " + T.names[T.turn]));
    top.appendChild(el("div", "grow"));
    const tp = el("div", "timerpill", ar(T.secs)); top.appendChild(tp);
    v.appendChild(top);

    const card = el("div", "card qcard");
    card.appendChild(Q.meta(q, true));
    card.appendChild(h("div", "stepbig", "+" + ar(steps) + (steps === 1 ? " خطوة" : steps === 2 ? " خطوتان" : " خطوات")));
    card.appendChild(Q.stem(p));
    if (q.type === "order") {
      card.appendChild(el("div", "tiny", "رتّبوها شفهيًّا:"));
      const g = el("div", "row"); p.shuf.forEach(t => g.appendChild(el("span", "chip", t))); card.appendChild(g);
    }
    if (q.type === "match") {
      const g1 = el("div", "row"); p.left.forEach(t => g1.appendChild(el("span", "chip", t)));
      const g2 = el("div", "row"); p.rshuf.forEach(o => g2.appendChild(el("span", "chip", o.t)));
      card.appendChild(el("div", "tiny", "العمودُ الأوّل")); card.appendChild(g1);
      card.appendChild(el("div", "tiny", "العمودُ الثاني (مبعثر)")); card.appendChild(g2);
    }

    const advance = (i, by) => {
      if (i >= 0) T.steps[i] += by;
      T.asked++; T.turn = (T.turn + 1) % T.names.length;
      Screens.teamsTrack(T);
    };
    const rev = el("button", "btn primary wide", "أظهرِ الإجابة"); rev.style.marginTop = "18px";
    rev.onclick = () => {
      Timer.stop(); rev.remove();
      const vd = el("div", "verdict good");
      vd.appendChild(el("h4", null, "الإجابة"));
      vd.appendChild(el("div", null, Q.answerText(p)));
      if (q.why) vd.appendChild(el("div", "tiny", q.why));
      if (q.src) vd.appendChild(el("span", "src", "المصدر: " + q.src));
      card.appendChild(vd);
      card.appendChild(el("div", "tiny", "من أجاب؟"));
      const main = el("button", "btn primary wide", T.names[T.turn] + " أجابَ · +" + ar(steps));
      main.style.marginTop = "8px";
      main.onclick = () => advance(T.turn, steps);
      card.appendChild(main);
      const row = el("div", "row"); row.style.marginTop = "10px";
      T.names.forEach((nm, i) => {
        if (i === T.turn) return;
        const b = el("button", "btn sm", nm + " خطفَها · +" + ar(stealSteps));
        b.style.borderColor = TEAM_COLORS[i];
        b.onclick = () => advance(i, stealSteps);
        row.appendChild(b);
      });
      const no = el("button", "btn quiet sm", "لا أحد"); no.onclick = () => advance(-1, 0);
      row.appendChild(no); card.appendChild(row);
    };
    card.appendChild(rev);
    card.appendChild(reportBtn(q));
    v.appendChild(card);
    const back = el("button", "btn quiet sm", "ألغِ السؤالَ وارجع");
    back.style.marginTop = "12px";
    back.onclick = () => { Timer.stop(); T.used.delete(q.id); Screens.teamsTrack(T); };
    v.appendChild(back);
    mount(v, "challenge");
    Timer.run(tp, T.secs, () => { });
  },

  teamsEnd(T) {
    Timer.stop();
    const max = Math.max.apply(null, T.steps);
    const win = T.names.filter((_, i) => T.steps[i] === max);
    const reached = max >= T.target;
    const v = document.createElement("div");
    const r = el("div", "res");
    r.appendChild(el("div", "eyebrow", reached ? "بلغتِ القافلةُ الكنز" : "انتهتِ الأسئلة"));
    r.appendChild(el("div", "big", win.length > 1 ? "تعادُل" : win[0]));
    r.appendChild(el("div", "muted", ar(max) + " خطوة من " + ar(T.target)));
    v.appendChild(r);
    const list = el("div", "grid"); list.style.marginTop = "16px";
    T.names.map((nm, i) => ({ nm, s: T.steps[i], i })).sort((a, b) => b.s - a.s).forEach(x => {
      const c = el("div", "card tight");
      c.style.borderInlineStartWidth = "6px"; c.style.borderInlineStartColor = TEAM_COLORS[x.i];
      c.appendChild(h("div", null, "<b>" + x.nm + "</b> — " + ar(x.s) + " خطوة"));
      list.appendChild(c);
    });
    v.appendChild(list);
    const row = el("div", "row center"); row.style.marginTop = "18px";
    const again = el("button", "btn primary", "جولةٌ جديدة"); again.onclick = Screens.teamsSetup;
    const back = el("button", "btn quiet", "التحدّيات"); back.onclick = Screens.challenges;
    row.appendChild(again); row.appendChild(back); v.appendChild(row);
    mount(v, "challenge");
  },

    const row = el("div", "row"); row.style.marginTop = "12px";
    row.appendChild(fileBtn("بنكُ الأسئلة", j => { if (!j.questions) throw new Error("لا questions"); Data.setBank(j); toast("حُمّلَ البنك: " + ar(j.questions.length)); }));
    row.appendChild(fileBtn("خريطةُ العالم", j => { if (!j.worlds) throw new Error("لا worlds"); Data.world = j; Data.index(); toast("حُمّلتِ الخريطة"); }));
    row.appendChild(fileBtn("المكافآت", j => { if (!j.badges) throw new Error("لا badges"); Data.rewards = j; toast("حُمّلتِ المكافآت"); }));
    d.appendChild(row);
    d.appendChild(el("div", "tiny", Store.persistent ? "التقدّمُ محفوظٌ على هذا الجهاز." : "⚠️ التخزينُ غيرُ متاحٍ هنا — التقدّمُ يضيعُ بالإغلاق (يعملُ عندَ فتحِ الملفِّ من القرص)."));
    v.appendChild(d);

    const rp = el("div", "card"); rp.style.marginTop = "14px";
    rp.appendChild(el("h3", null, "البلاغات"));
    const list = Reports.all();
    rp.appendChild(el("div", "tiny", list.length ? ar(list.length) + " بلاغًا محفوظًا على هذا الجهاز — انسخْها وأرسِلْها." : "لا بلاغاتٍ بعد. زرُّ الإبلاغِ أسفلَ كلِّ سؤال."));
    if (list.length) {
      const box = el("div", "book"); box.style.marginTop = "10px";
      list.slice().reverse().slice(0, 12).forEach(r => {
        const k = el("div", "card tight");
        k.appendChild(h("div", null, "<b>" + r.reason + "</b> · " + r.id));
        k.appendChild(el("div", "tiny", r.q + (r.note ? " — " + r.note : "")));
        box.appendChild(k);
      });
      rp.appendChild(box);
      const rr = el("div", "row"); rr.style.marginTop = "12px";
      const cp = el("button", "btn sm", "انسخِ البلاغات");
      cp.onclick = () => {
        const t = Reports.text();
        try { navigator.clipboard.writeText(t).then(() => toast("نُسِخت — الصقْها في الرسالة"), () => toast("تعذّرَ النسخ")); }
        catch (e) { toast("تعذّرَ النسخ"); }
      };
      const dl = el("button", "btn sm", "نزّلْ ملفًّا");
      dl.onclick = () => {
        try {
          const blob = new Blob([JSON.stringify(Reports.all(), null, 2)], { type: "application/json" });
          const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
          a.download = "quest-reports.json"; a.click(); URL.revokeObjectURL(a.href);
        } catch (e) { toast("تعذّرَ التنزيل"); }
      };
      const cl = el("button", "btn quiet sm", "امسحْها");
      cl.onclick = () => { if (window.confirm("مسحُ كلِّ البلاغات؟")) { Reports.clear(); Screens.settings(); } };
      rr.appendChild(cp); rr.appendChild(dl); rr.appendChild(cl); rp.appendChild(rr);
    }
    v.appendChild(rp);

    const dz = el("div", "card"); dz.style.marginTop = "14px";
    const reset = el("button", "btn quiet sm", "صفِّرِ التقدّم"); reset.style.marginTop = "12px";
    reset.onclick = () => { if (window.confirm("تصفيرُ كلِّ التقدّم؟")) { P.reset(); Theme.apply("sand"); toast("صُفِّر"); Screens.map(); } };
    dz.appendChild(reset);
    v.appendChild(dz);
    mount(v, "me");
  },

  /* ---------- 3.10 bank inspector ---------- */
  inspect() {
    const v = document.createElement("div");
    const back = el("button", "btn quiet sm", "→ التحدّيات"); back.onclick = Screens.challenges; v.appendChild(back);
    v.appendChild(el("h1", null, "تدقيقُ البنك"));
    const qs = Data.bank.questions || [];
    const flagged = qs.filter(q => /يُراجَع/.test(String(q.src || "")));
    const drafts = qs.filter(q => q.status !== "approved");
    const relNoSrc = qs.filter(q => Data.catGroup(q.cat) === "religious" && !q.src);
    const ids = {}; qs.forEach(q => ids[q.id] = (ids[q.id] || 0) + 1);
    const dup = Object.keys(ids).filter(k => ids[k] > 1);
    const ident = qs.filter(q => { const a = q.type === "order" ? q.answer : q.type === "match" ? q.a : null; return a && a.every((x, i) => x === i); });
    const orphan = qs.filter(q => !Object.values(Data.regions).some(r => (r.cats || []).indexOf(q.cat) >= 0));

    const stats = el("div", "stats"); stats.style.marginTop = "14px";
    const add = (lab, val, warn) => { const d = el("div", "stat" + (warn && val ? " warn" : "")); d.appendChild(el("b", null, ar(val))); d.appendChild(el("span", "tiny", lab)); stats.appendChild(d); };
    add("سؤالًا", qs.length); add("مسوّدة", drafts.length, 1); add("«يُراجَع»", flagged.length, 1);
    add("دينيٌّ بلا مصدر", relNoSrc.length, 1); add("مُعرِّفٌ مكرَّر", dup.length, 1);
    add("جوابٌ متسلسل", ident.length, 1); add("بلا إقليم", orphan.length, 1);
    v.appendChild(stats);

    v.appendChild(h("div", "card tight",
      "<b>ملاحظات</b><div class='tiny' style='line-height:1.9;margin-top:6px'>" +
      "• «جوابٌ متسلسل»: أسئلةُ الترتيبِ والمطابقةِ مخزَّنٌ جوابُها [٠،١،٢،٣] — الترتيبُ المخزَّنُ هو الجواب. اللعبةُ تبعثرُها إجباريًّا عندَ العرض.<br>" +
      "• «بلا إقليم»: فئةٌ في البنكِ لا يشيرُ إليها أيُّ إقليمٍ في <code>world.json</code> — لن تظهرَ في الرحلة.<br>" +
      "• الحارسُ عندَ الدمج: <code>allowDrafts=false</code> ⟸ اللعبةُ تقرأُ <code>approved</code> فقط.</div>"));

    const search = document.createElement("input"); search.type = "text"; search.placeholder = "بحث: نصّ · فئة · مُعرِّف · مصدر";
    search.style.width = "100%"; search.style.margin = "14px 0";
    v.appendChild(search);
    const wrap = el("div", "tbl");
    const tb = document.createElement("table");
    tb.innerHTML = "<thead><tr><th>المعرّف</th><th>الفئة</th><th>عمر</th><th>صعوبة</th><th>نوع</th><th>النصّ</th><th>الجواب</th><th>المصدر</th></tr></thead>";
    const body = document.createElement("tbody"); tb.appendChild(body); wrap.appendChild(tb); v.appendChild(wrap);
    const paint = () => {
      const t = search.value.trim(); body.innerHTML = "";
      qs.filter(q => !t || JSON.stringify(q).indexOf(t) > -1 || Data.catName(q.cat).indexOf(t) > -1).forEach(q => {
        const p = Q.present(q), tr = document.createElement("tr");
        [q.id, Data.catName(q.cat), BAND_LABEL[q.band] || q.band, DIFF_LABEL[q.diff], TYPE_LABEL[q.type] || q.type,
        (q.q || q.verse || "").slice(0, 64), String(Q.answerText(p)).slice(0, 40), q.src || "—"].forEach((c, i) => {
          const td = el("td", null, c); if (i === 7 && /يُراجَع/.test(String(q.src || ""))) td.style.color = "var(--pom)";
          tr.appendChild(td);
        });
        body.appendChild(tr);
      });
    };
    search.oninput = paint; paint();
    mount(v, "challenge");
  }
};

const TEAM_COLORS = ["#E0A32E", "#2E7D63", "#9C2F3E", "#2B5C8A"];

function fileBtn(label, apply) {
  const lab = el("label", "btn sm", label);
  const inp = document.createElement("input"); inp.type = "file"; inp.accept = ".json,application/json"; inp.style.display = "none";
  inp.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => { try { apply(JSON.parse(r.result)); Screens.settings(); } catch (err) { toast("تعذّرَ القراءة: " + err.message); } };
    r.readAsText(f, "utf-8");
  };
  lab.appendChild(inp); return lab;
}

/* ==========================================================
   ROUND RUNNER — محرّكُ الجولةِ لكلِّ الأوضاع
   ========================================================== */
const Round = {
  st: null, tid: null, timerNode: null,

  start(cfg) {
    P.touchDay();
    this.st = {
      cfg, i: 0, correct: 0, xp: 0, coins: 0, combo: 0, done: false,
      left: cfg.seconds || 0, answered: []
    };
    this.render();
  },
  stopTimer() { if (this.tid) { clearInterval(this.tid); this.tid = null; } this.timerNode = null; },
  runTimer(onEnd) {                     /* الوقتُ في حالةِ الجولةِ لا في العُقدة — فالعُقدةُ تُعادُ مع كلِّ سؤال */
    this.stopTimer();
    this.tid = setInterval(() => {
      const st = this.st; if (!st) return this.stopTimer();
      st.left--;
      if (this.timerNode) {
        this.timerNode.textContent = ar(Math.max(0, st.left));
        if (st.left <= 5) this.timerNode.classList.add("low");
      }
      if (st.left <= 0) { const t = this.tid; clearInterval(t); this.tid = null; onEnd && onEnd(); }
    }, 1000);
  },

  render() {
    const st = this.st, cfg = st.cfg;
    if (st.i >= cfg.list.length || st.done) return this.finish();
    const q = cfg.list[st.i], p = Q.present(q);

    const v = document.createElement("div");
    const top = el("div", "playtop");
    const quit = el("button", "btn quiet sm", "✕"); quit.onclick = () => { this.stopTimer(); cfg.onEnd && cfg.onEnd(); };
    top.appendChild(quit);
    const bar = el("div", "progressbar"); const fill = el("i");
    fill.style.width = Math.round(st.i / cfg.list.length * 100) + "%"; bar.appendChild(fill); top.appendChild(bar);
    let tp = null;
    if (cfg.kind === "speed") { tp = el("div", "timerpill", ar(st.left)); top.appendChild(tp); }
    else top.appendChild(h("span", "pill", ar(st.i + 1) + " / " + ar(cfg.list.length)));
    v.appendChild(top);
    v.appendChild(h("div", "tiny", cfg.title));

    const card = el("div", "card qcard"); card.style.marginTop = "10px";
    card.appendChild(Q.meta(q, cfg.kind !== "speed"));
    card.appendChild(Q.stem(p));
    card.appendChild(Q.body(p, ok => this.judge(q, p, ok, card)));
    if (!q.generated) card.appendChild(reportBtn(q));
    v.appendChild(card);
    mount(v, TAB);

    if (cfg.kind === "speed" && tp) {
      this.timerNode = tp; tp.textContent = ar(Math.max(0, st.left));
      if (!this.tid) this.runTimer(() => { st.done = true; this.finish(); });
    }
  },

  judge(q, p, ok, card) {
    const st = this.st, ec = Data.rewards.economy;
    st.answered.push({ q, ok });
    if (ok) {
      st.correct++; st.combo = Math.min((ec.comboMax || 2), st.combo + (ec.comboStep || .25));
      const xp = Math.round((ec.xpPerDiff[q.diff] || 10) * (1 + st.combo - (ec.comboStep || .25)));
      const co = Math.round((ec.coinPerDiff[q.diff] || 3) * (1 + st.combo - (ec.comboStep || .25)));
      st.xp += xp; st.coins += co;
      P.s.correctTotal++; P.addXP(xp); P.addCoins(co); P.collect(q);
      SFX.good(); SFX.coin();
    } else {
      st.combo = 0; P.s.wrongTotal++; SFX.bad();
    }
    P.save();

    if (st.cfg.kind === "speed") {           /* السرعة: تقدّمٌ تلقائيٌّ بلا شرح */
      setTimeout(() => { st.i++; if (!st.done) this.render(); }, 420);
      return;
    }
    const vd = el("div", "verdict " + (ok ? "good" : "bad"));
    vd.appendChild(el("h4", null, ok ? "إجابةٌ صحيحة" : "الصحيحُ غيرُ ذلك"));
    if (!ok) vd.appendChild(h("div", null, "<b>الجواب:</b> " + Q.answerText(p)));
    if (q.why) vd.appendChild(el("div", null, q.why));
    if (q.src) vd.appendChild(el("span", "src", "المصدر: " + q.src));
    if (ok) vd.appendChild(h("div", "gain", "<span>+" + ar(Math.round((Data.rewards.economy.xpPerDiff[q.diff] || 10))) + " خبرة</span><span>🪙 +" + ar(Math.round((Data.rewards.economy.coinPerDiff[q.diff] || 3))) + "</span>"));
    card.appendChild(vd);
    const nx = el("button", "btn primary wide", st.i + 1 >= st.cfg.list.length ? "النتيجة" : "التالي");
    nx.style.marginTop = "16px";
    nx.onclick = () => { st.i++; this.render(); };
    card.appendChild(nx); nx.focus();
  },

  finish() {
    this.stopTimer();
    const st = this.st, cfg = st.cfg;
    const total = st.answered.length || 1;
    const pct = Math.round(st.correct / total * 100);
    const th = Data.rewards.economy.starThresholds || [60, 80, 100];
    let stars = 0; th.forEach(t => { if (pct >= t) stars++; });

    if (cfg.kind === "journey" && cfg.region != null) {
      P.markStation(cfg.region, cfg.station, stars);
      if (stars > 0) Rewards.openChest("station");
      if (P.regionDone(cfg.region)) Rewards.openChest("region");
    }
    if (cfg.kind === "daily") {
      if (P.s.lastDaily !== dayKey()) { P.s.lastDaily = dayKey(); P.s.dailyDone++; Rewards.openChest("daily"); }
    }
    if (cfg.kind === "speed") { P.s.speedBest = Math.max(P.s.speedBest || 0, st.correct); }
    P.save();
    const unlocks = Rewards.check();

    const v = document.createElement("div");
    const r = el("div", "res");
    r.appendChild(el("div", "eyebrow", cfg.title));
    if (cfg.kind === "speed") {
      r.appendChild(el("div", "big", ar(st.correct)));
      r.appendChild(el("div", "muted", "إصابةً في ستّينَ ثانية · أفضلُ نتيجةٍ لك " + ar(P.s.speedBest)));
    } else {
      r.appendChild(h("div", "starsbig", starsRow(stars).replace(/☆/g, '<span class="off">☆</span>')));
      r.appendChild(el("div", "big", ar(pct) + "٪"));
      r.appendChild(el("div", "muted", "أصبتَ " + ar(st.correct) + " من " + ar(total)));
    }
    r.appendChild(h("div", "gain", "<span>+" + ar(st.xp) + " خبرة</span><span>🪙 +" + ar(st.coins) + "</span>"));
    v.appendChild(r);

    const wrong = st.answered.filter(a => !a.ok);
    if (wrong.length) {
      const box = el("div", "grid"); box.style.marginTop = "18px";
      box.appendChild(el("h3", null, "راجِعْ هذه"));
      wrong.forEach(a => {
        const c = el("div", "card tight");
        c.appendChild(h("div", null, "<b>" + (a.q.q || a.q.verse || "") + "</b>"));
        c.appendChild(el("div", "tiny", "الجواب: " + Q.answerText(Q.present(a.q)) + (a.q.why ? " — " + a.q.why : "")));
        box.appendChild(c);
      });
      v.appendChild(box);
    }
    const row = el("div", "row center"); row.style.marginTop = "20px";
    const again = el("button", "btn primary", "مرّةً أخرى");
    again.onclick = () => Round.start(Object.assign({}, cfg, { list: shuffle(cfg.list) }));
    const out = el("button", "btn quiet", "خروج"); out.onclick = () => cfg.onEnd && cfg.onEnd();
    row.appendChild(again); row.appendChild(out); v.appendChild(row);
    mount(v, TAB);
    showUnlocks(unlocks);
  }
};

/* ==========================================================
   BOOT
   ========================================================== */
async function boot() {
  VIEW = document.getElementById("view");
  HUD = document.getElementById("hud");
  NAV = document.getElementById("nav");
  try {
    await Data.load();
    P.load();
    Theme.apply(P.s.theme);
    Rewards.check();
    Screens.map();
  } catch (e) {
    ErrLog.push("إقلاع", (e && e.message) || String(e), "boot");
    VIEW.appendChild(h("div", "notice", "<b>تعذّرَ الإقلاع.</b> التفاصيلُ في شريطِ الأخطاءِ بالأسفل."));
  }
}
if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
else boot();
