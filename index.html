// Memorization screen (المحفّظ) — Layer A: full-mushaf surah picker + progressive reveal.
// ============================================================
// Quran text is read ONLY from the canonical mushaf via getVerseText — never model output
// (honors the guarantee at the loadQuran definition). No AI / prompt branch, no persistence,
// no continuous live-ASR, and no error/red-highlight detection in this layer.
const MEM = {
  TITLE: 'المُحفّظ',
  PICKER_HEADING: 'اختر سورةً لتبدأ الحفظ',
  START_LABEL: 'ابدأ من آية',
  START_BTN: 'ابدأ',
  REVEAL_BTN: 'افتح عليّ',
  LISTEN_BTN: 'استمع',
  LISTEN_RANGE_BTN: 'استمع للمقطع',
  REVEAL_LABEL: 'الكشف',
  GRAN_AYAH: 'آية',
  GRAN_WORD: 'كلمة',
  CHANGE_SURAH: 'سورة أخرى',
  HIDE: 'إخفاء',
  BACK_BTN: 'رجوع',
  LOADING: 'لحظة، يُحضَّر المصحف…',
  PRAISE_M: 'أحسنتَ، تابِع.',
  PRAISE_F: 'أحسنتِ، تابِعي.',
  FINISH_M: 'أتممتَ المقطع، بارك الله فيك.',
  FINISH_F: 'أتممتِ المقطع، بارك الله فيكِ.',
  MODE_MANUAL: 'تلقين يدوي',
  MODE_ADNAN: 'استماع وترديد',
  ADNAN_START: 'ابدأ',
  ADNAN_STOP: 'إيقاف',
  ADNAN_REPEAT: 'أعد الآية',
  ADNAN_AYAH_LABEL: 'آية',
  MODE_RECITE: 'سمِّعني',
  RECITE_HINT: 'هذا تمرينٌ يعينك على الحفظ، والتسميع الحقيقيّ يكون عند معلّمك أو والديك.',
  RECITE_START: 'ابدأ التسميع',
  RECITE_STOP: 'إيقاف',
  RECITE_DONE: 'أحسنت، تابِع حفظك.',
  RECITE_NEXT: 'الآية التالية',
};

function MemorizeScreen({ profile, onExit, onPlayVerse, onPlaySurah, onStopAudio }) {
  const [ready, setReady] = useState(!!__quranData); // true once the mushaf JSON is in memory
  const [counts, setCounts] = useState(null);        // { [surahNum]: ayahCount } — built once, single pass
  const [view, setView] = useState('picker');        // 'picker' | 'drill'
  const [selectedSurah, setSelectedSurah] = useState(null); // 1..114
  const [startAyah, setStartAyah] = useState(1);
  const [granularity, setGranularity] = useState('word'); // 'ayah' | 'word' (default word — one word per reveal)
  const [revealedCount, setRevealedCount] = useState(0);
  // Layer C — عدنان listen-and-repeat audio talqin (alongside the manual reveal).
  const [drillMode, setDrillMode] = useState('manual'); // 'manual' | 'adnan'
  const [adnanAyah, setAdnanAyah] = useState(null);     // current ayah playing in the loop
  const [adnanRunning, setAdnanRunning] = useState(false);
  const adnanTimeoutRef = useRef(null);                 // pending repeat-pause timer
  const runIdRef = useRef(0);                           // local loop cancel token (sequenceIdRef is App-owned, not in scope)
  // Layer B — سمِّعني recite-from-memory (own recognizer; transcript NEVER rendered/stored).
  const [reciteListening, setReciteListening] = useState(false);
  const [reciteStates, setReciteStates] = useState([]); // per-expected-word: matched|mismatch|pending
  const [reciteErr, setReciteErr] = useState('');       // graceful-fail note (no SR / mic denied)
  const reciteRecognitionRef = useRef(null);            // own SpeechRecognition (separate from chat/call refs)
  const reciteRunIdRef = useRef(0);                     // cancel token so a stale onend can't reopen the mic
  const reciteHeardRef = useRef('');                    // transient transcript — never rendered, never saved
  const [reciteAyah, setReciteAyah] = useState(null);   // current recite ayah; current = reciteAyah || startAyah
  const [reciteFinished, setReciteFinished] = useState(false); // whole range done → show finish line
  const reciteAyahRef = useRef(null);                   // live mirror so onresult reads the current ayah synchronously

  const isFemale = profile?.gender === 'female';

  // Load the mushaf once, then tally ayah counts per surah in a SINGLE pass over all keys
  // (keys are "surahNum:ayah" — the same prefix shape getSurahAyahCount relies on). This
  // avoids calling getSurahAyahCount 114 times (= 114 full scans).
  useEffect(() => {
    let alive = true;
    loadQuran()
      .then(() => {
        if (!alive) return;
        const c = {};
        for (const k in __quranData) {
          const colon = k.indexOf(':');
          if (colon < 1) continue;
          const sn = parseInt(k.slice(0, colon), 10);
          if (sn >= 1) c[sn] = (c[sn] || 0) + 1;
        }
        setCounts(c);
        setReady(true);
      })
      .catch(() => { /* fail-safe: stay on the loading string; never fall back to model text */ });
    return () => { alive = false; };
  }, []);

  // Layer C teardown — runs on MemorizeScreen unmount (leaving the memorize screen). cancelAudio
  // does NOT clear timers, so we clear the pending repeat-pause; we also bump runIdRef so a loop
  // mid-ayah bails after the App-level [screen] cleanup pauses its audio (instead of advancing).
  useEffect(() => () => {
    runIdRef.current++;
    if (adnanTimeoutRef.current) clearTimeout(adnanTimeoutRef.current);
    // Layer B: stop the recite recognizer on unmount (the App [screen] cleanup doesn't know it).
    reciteRunIdRef.current++;
    try { reciteRecognitionRef.current?.stop(); } catch (e) {}
  }, []);

  const surahCount = (counts && selectedSurah) ? (counts[selectedSurah] || 0) : 0; // last ayah of range

  // Ordered reveal units for [startAyah .. last ayah]. Ayah text is canonical only.
  // ayah granularity → one unit per ayah; word granularity → one unit per word, grouped by ayah.
  const buildUnits = () => {
    if (!ready || !selectedSurah || !surahCount) return [];
    const out = [];
    for (let a = startAyah; a <= surahCount; a++) {
      const text = getVerseText(selectedSurah, a) || '';
      if (granularity === 'word') {
        const words = text.split(/\s+/).filter(Boolean);
        words.forEach((w, wi) => out.push({ ayah: a, text: w, firstInAyah: wi === 0 }));
      } else {
        out.push({ ayah: a, text, firstInAyah: true });
      }
    }
    return out;
  };
  const units = view === 'drill' ? buildUnits() : [];
  const allRevealed = units.length > 0 && revealedCount >= units.length;
  // Focus ayah for the single-ayah "listen": the ayah holding the next hidden unit, else the last.
  const focusAyah = units.length === 0 ? startAyah
    : (revealedCount < units.length ? units[revealedCount].ayah : units[units.length - 1].ayah);
  // Light, occasional praise — every few units while drilling, NOT on every press.
  const showPraise = !allRevealed && granularity === 'ayah' && revealedCount > 0 && revealedCount % 4 === 0;

  const openPicker = () => { setView('picker'); setRevealedCount(0); };
  const startDrill = () => { setView('drill'); setRevealedCount(0); };
  const setGran = (g) => { setGranularity(g); setRevealedCount(0); }; // switching re-hides the range

  // ---------- عدنان listen-and-repeat loop ----------
  // Cancellation uses a LOCAL runIdRef (App's sequenceIdRef/cancelAudio are not in scope, and
  // playVerseManual bumps the sequence token every call so it can't be our stable loop token).
  // Audio is stopped via the onStopAudio prop (App cancelAudio). The pause between ayat is
  // proportional to the ayah's measured playback time, clamped to a sane floor/ceiling.
  const ADNAN_PAUSE_FACTOR = 1.15, ADNAN_PAUSE_FLOOR = 1500, ADNAN_PAUSE_CEIL = 9000; // ms

  const stopAdnan = () => {
    runIdRef.current++;                       // invalidate the running loop so it bails at its next guard
    if (adnanTimeoutRef.current) { clearTimeout(adnanTimeoutRef.current); adnanTimeoutRef.current = null; }
    if (onStopAudio) onStopAudio();           // App cancelAudio: pause current ayah + bump sequenceIdRef
    setAdnanRunning(false);
  };

  const startAdnan = async () => {
    if (!ready || !selectedSurah || !surahCount) return;
    if (onStopAudio) onStopAudio();           // clear any prior audio before starting fresh
    if (adnanTimeoutRef.current) { clearTimeout(adnanTimeoutRef.current); adnanTimeoutRef.current = null; }
    const myRun = ++runIdRef.current;         // local cancel token for THIS run
    setAdnanRunning(true);
    for (let a = startAyah; a <= surahCount; a++) {
      if (runIdRef.current !== myRun) return; // stopped / mode switched / screen left / restarted
      setAdnanAyah(a);
      const t0 = performance.now();
      try { await onPlayVerse(selectedSurah, a); } catch (e) {} // resolves when the ayah audio ENDS
      if (runIdRef.current !== myRun) return;
      const elapsed = performance.now() - t0;
      const pause = Math.min(ADNAN_PAUSE_CEIL, Math.max(ADNAN_PAUSE_FLOOR, elapsed * ADNAN_PAUSE_FACTOR));
      await new Promise((r) => { adnanTimeoutRef.current = setTimeout(r, pause); });
      if (runIdRef.current !== myRun) return;
    }
    if (runIdRef.current === myRun) { setAdnanRunning(false); setAdnanAyah(null); } // natural completion
  };

  const repeatAyah = async () => {
    const a = adnanAyah || startAyah;
    stopAdnan();                              // halt the loop + audio + pending pause first
    try { await onPlayVerse(selectedSurah, a); } catch (e) {} // replay this ayah once; user presses ابدأ to continue
  };

  // ---------- سمِّعني recite-from-memory ----------
  // Own ar-SA recognizer, mirroring the call handler's cumulative-finals prefix-merge. On each
  // onresult we re-match the WHOLE heard-so-far against the WHOLE expected ayah (cheap; ayat are
  // short) and recolor. The transcript lives only in reciteHeardRef — never rendered, never saved.
  const stopRecite = () => {
    reciteRunIdRef.current++;            // invalidate: a stale onend can't restart the mic
    setReciteListening(false);
    const rec = reciteRecognitionRef.current;
    if (rec) { try { rec.onresult = null; rec.onend = null; rec.onerror = null; rec.stop(); } catch (e) {} }
    // leave reciteStates as-is so the last result stays visible after stop
  };

  const startRecite = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setReciteErr(RECITE_NO_SR); return; } // graceful fail, same message as chat/call
    setReciteErr('');
    setReciteFinished(false);
    setReciteAyah(startAyah);
    reciteAyahRef.current = startAyah;
    reciteHeardRef.current = '';
    setReciteStates([]);
    // Cumulative EXPECTED (Option C): expected = tokens of ayat startAyah..targetAyah, with the
    // CURRENT ayah's offset/length so we can slice its states out of the full alignment. No
    // heard-text reset on advance — heard stays cumulative and aligns against the growing expected
    // (robust to ar-SA cumulative re-segmentation; no mic teardown).
    const buildExpected = (toAyah) => {
      const tokens = [];
      let curOffset = 0, curLen = 0;
      for (let a = startAyah; a <= toAyah; a++) {
        const at = tokenizeForRecite(getVerseText(selectedSurah, a) || '');
        if (a === toAyah) { curOffset = tokens.length; curLen = at.length; }
        for (let t = 0; t < at.length; t++) tokens.push(at[t]);
      }
      return { tokens, curOffset, curLen };
    };
    const rec = new SR();
    rec.lang = 'ar-SA';
    rec.continuous = true;
    rec.interimResults = true;
    const myRun = ++reciteRunIdRef.current;
    rec.onresult = (event) => {
      // Cumulative-finals prefix-merge — identical to the call recognizer.
      let finalText = '', interim = '';
      for (let i = 0; i < event.results.length; i++) {
        const t = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          const seg = t.trim();
          if (!seg) continue;
          if (!finalText) finalText = seg;
          else if (seg.startsWith(finalText)) finalText = seg;
          else if (finalText.startsWith(seg)) { /* covered */ }
          else finalText = finalText + ' ' + seg;
        } else { interim += t; }
      }
      reciteHeardRef.current = (finalText + ' ' + interim).trim();
      // Match FULL cumulative heard vs FULL cumulative expected (up to the current ayah), then
      // display + completion-check only the CURRENT ayah's slice of states.
      const cur = reciteAyahRef.current || startAyah;
      const { tokens, curOffset, curLen } = buildExpected(cur);
      const fullStates = alignRecite(tokens, tokenizeForRecite(reciteHeardRef.current));
      const currentSlice = fullStates.slice(curOffset, curOffset + curLen);
      // TEMP (error-flagging disabled): treat 'mismatch' as reached/black so red never renders and a
      // tashkeel/madd slip can't block progression. 'pending' (not-yet-reached) still gates advance.
      // alignRecite is untouched — we only reinterpret its output here. Revisit when tashkeel/madd is handled.
      const shown = currentSlice.map((x) => (x === 'mismatch' ? 'matched' : x));
      const allMatched = shown.length > 0 && shown.every((x) => x === 'matched');
      if (allMatched && cur < surahCount) {
        // Auto-advance. Set the ref synchronously so a rapid follow-up onresult can't re-advance the
        // same completion; blank the slice so the new ayah renders dim until the next onresult fills it.
        const next = cur + 1;
        reciteAyahRef.current = next;
        setReciteAyah(next);
        setReciteStates([]);
      } else {
        setReciteStates(shown);
        if (allMatched && cur >= surahCount) { setReciteFinished(true); stopRecite(); } // last ayah → finish
      }
    };
    rec.onend = () => {
      // Auto-restart only if this run is still current (stopRecite/unmount bumped the id otherwise).
      if (reciteRunIdRef.current === myRun) { try { rec.start(); } catch (e) {} }
    };
    rec.onerror = (e) => {
      const fatal = ['not-allowed', 'audio-capture', 'service-not-allowed'];
      if (fatal.includes(e.error)) { reciteRunIdRef.current++; setReciteListening(false); setReciteErr(RECITE_NO_SR); }
    };
    reciteRecognitionRef.current = rec;
    setReciteListening(true);
    try { rec.start(); } catch (e) {}
  };

  // Manual advance — freeze-proof fallback so a missed/substituted last word can't lock progress.
  const advanceReciteManual = () => {
    const cur = reciteAyahRef.current || startAyah;
    if (cur < surahCount) {
      const next = cur + 1;
      reciteAyahRef.current = next;
      setReciteAyah(next);
      setReciteStates([]); // new ayah starts dim; recomputed on the next onresult
    } else {
      setReciteFinished(true);
      stopRecite();
    }
  };

  const setMode = (m) => {
    if (m === drillMode) return;
    stopAdnan();
    stopRecite();
    if (m === 'recite') { // fresh recite session from the start of the range
      setReciteStates([]); reciteHeardRef.current = ''; setReciteErr('');
      setReciteAyah(startAyah); reciteAyahRef.current = startAyah; setReciteFinished(false);
    }
    setDrillMode(m);
  };

  // ---------- PICKER ----------
  if (view === 'picker') {
    return (
      <div style={s.memContainer}>
        <div style={s.memHeader}>
          <div style={s.memTitle}>{MEM.TITLE}</div>
          <button onClick={onExit} style={s.memBackBtn}>{MEM.BACK_BTN}</button>
        </div>
        <div style={s.memHeading}>{MEM.PICKER_HEADING}</div>
        {!ready && <div style={s.memLoading}>{MEM.LOADING}</div>}
        <div style={s.memList}>
          {Array.from({ length: 114 }, (_, i) => i + 1).map((n) => {
            const active = selectedSurah === n;
            return (
              <button
                key={n}
                onClick={() => { setSelectedSurah(n); setStartAyah(1); }}
                style={{ ...s.memRow, ...(active ? s.memRowActive : {}) }}
              >
                {/* RTL row: number badge (rightmost) · name + ayah count (center) · revelation label (leftmost) */}
                <span style={s.memRowNum}>{toArabicDigits(n)}</span>
                <span style={s.memRowNameWrap}>
                  <span style={{ ...s.memRowName, ...(active ? { color: '#FAF7F2' } : {}) }}>{SURAH_NAMES[n]}</span>
                  <span style={{ ...s.memRowCount, ...(active ? { color: 'rgba(250,247,242,0.8)' } : {}) }}>{counts && counts[n] ? `${toArabicDigits(counts[n])} ${MEM.GRAN_AYAH}` : ''}</span>
                </span>
                <span style={s.memRowReveal}>{revelationLabel(n)}</span>
              </button>
            );
          })}
        </div>
        {selectedSurah && (
          <div style={s.memStartBar}>
            <span style={s.memStartLabel}>{MEM.START_LABEL}</span>
            <select
              value={startAyah}
              onChange={(e) => setStartAyah(parseInt(e.target.value, 10) || 1)}
              style={s.memAyahSelect}
              disabled={!ready || !surahCount}
            >
              {Array.from({ length: surahCount || 1 }, (_, i) => i + 1).map((a) => (
                <option key={a} value={a}>{toArabicDigits(a)}</option>
              ))}
            </select>
            <button onClick={startDrill} style={{ ...s.memStartBtn, opacity: (!ready || !surahCount) ? 0.5 : 1 }} disabled={!ready || !surahCount}>{MEM.START_BTN}</button>
          </div>
        )}
      </div>
    );
  }

  // ---------- DRILL ----------
  const praiseLine = isFemale ? MEM.PRAISE_F : MEM.PRAISE_M;
  const finishLine = isFemale ? MEM.FINISH_F : MEM.FINISH_M;
  return (
    <div style={s.memContainer}>
      <div style={s.memHeader}>
        <div style={s.memTitle}>{MEM.TITLE}</div>
        <button onClick={onExit} style={s.memBackBtn}>{MEM.BACK_BTN}</button>
      </div>
      <div style={s.memSubBar}>
        <span style={s.memSurahTitle}>{SURAH_NAMES[selectedSurah]}</span>
        <span style={s.memRangeBadge}>{`${MEM.GRAN_AYAH} ${toArabicDigits(startAyah)}`}</span>
        <button onClick={openPicker} style={s.memChangeBtn}>{MEM.CHANGE_SURAH}</button>
      </div>
      {/* Drill mode switch: manual reveal · عدنان listen-and-repeat (Layer C) · سمِّعني recite (Layer B). */}
      <div style={s.memToggleRow}>
        <button onClick={() => setMode('manual')} style={{ ...s.memGranBtn, ...(drillMode === 'manual' ? s.memGranBtnActive : {}) }}>{MEM.MODE_MANUAL}</button>
        <button onClick={() => setMode('adnan')} style={{ ...s.memGranBtn, ...(drillMode === 'adnan' ? s.memGranBtnActive : {}) }}>{MEM.MODE_ADNAN}</button>
        <button onClick={() => setMode('recite')} style={{ ...s.memGranBtn, ...(drillMode === 'recite' ? s.memGranBtnActive : {}) }}>{MEM.MODE_RECITE}</button>
      </div>
      {drillMode === 'manual' && (
      <div style={s.memToggleRow}>
        <span style={s.memToggleLabel}>{MEM.REVEAL_LABEL}</span>
        <button onClick={() => setGran('ayah')} style={{ ...s.memGranBtn, ...(granularity === 'ayah' ? s.memGranBtnActive : {}) }}>{MEM.GRAN_AYAH}</button>
        <button onClick={() => setGran('word')} style={{ ...s.memGranBtn, ...(granularity === 'word' ? s.memGranBtnActive : {}) }}>{MEM.GRAN_WORD}</button>
      </div>
      )}
      {drillMode === 'manual' && (
      <div style={s.memDrillArea}>
        <div style={s.memDrillText}>
          {units.map((u, i) => {
            const revealed = i < revealedCount;
            const isNext = i === revealedCount;
            if (!revealed && !isNext) return null; // beyond the next unit stays fully hidden
            return (
              <span key={i} style={s.memUnit}>
                {u.firstInAyah && <span style={s.memAyahBadge}>{toArabicDigits(u.ayah)}</span>}
                {revealed
                  ? <span style={s.memWord}>{u.text}</span>
                  : <span style={s.memPlaceholder}>{granularity === 'word' ? '—' : '— — —'}</span>}
              </span>
            );
          })}
        </div>
        {showPraise && <div style={s.memMsg}>{praiseLine}</div>}
        {allRevealed && <div style={s.memMsg}>{finishLine}</div>}
      </div>
      )}
      {drillMode === 'manual' && (
      <div style={s.memControls}>
        <button onClick={() => onPlayVerse && onPlayVerse(selectedSurah, focusAyah)} style={s.memListenBtn}>{MEM.LISTEN_BTN}</button>
        <button onClick={() => setRevealedCount((c) => Math.min(c + 1, units.length))} style={{ ...s.memRevealBtn, opacity: allRevealed ? 0.5 : 1 }} disabled={allRevealed}>{MEM.REVEAL_BTN}</button>
        {/* Re-hide/reset the same range. */}
        <button onClick={() => setRevealedCount(0)} style={s.memListenBtn}>{MEM.HIDE}</button>
      </div>
      )}
      {drillMode === 'adnan' && (
      <div style={s.memDrillArea}>
        <div style={s.memSurahTitle}>{`${SURAH_NAMES[selectedSurah]} · ${MEM.ADNAN_AYAH_LABEL} ${toArabicDigits(adnanAyah || startAyah)}`}</div>
        <div style={s.memDrillText}>
          <span style={s.memWord}>{getVerseText(selectedSurah, adnanAyah || startAyah) || ''}</span>
        </div>
      </div>
      )}
      {drillMode === 'adnan' && (
      <div style={s.memControls}>
        <button onClick={() => (adnanRunning ? stopAdnan() : startAdnan())} style={s.memRevealBtn}>{adnanRunning ? MEM.ADNAN_STOP : MEM.ADNAN_START}</button>
        <button onClick={repeatAyah} style={s.memListenBtn}>{MEM.ADNAN_REPEAT}</button>
      </div>
      )}
      {drillMode === 'recite' && (
      <div style={s.memDrillArea}>
        <div style={s.memReciteHint}>{MEM.RECITE_HINT}</div>
        <div style={s.memSurahTitle}>{`${SURAH_NAMES[selectedSurah]} · ${MEM.ADNAN_AYAH_LABEL} ${toArabicDigits(reciteAyah || startAyah)}`}</div>
        <div style={s.memDrillText}>
          {(() => {
            // Display the CURRENT recite ayah (original diacritized words), colored by its slice of
            // states. Standalone ornament/pause glyphs normalize to '' — render dim, don't consume a
            // state, so the state index stays aligned with the matchable words. Child's words never shown.
            const displayWords = (getVerseText(selectedSurah, reciteAyah || startAyah) || '').split(/\s+/).filter(Boolean);
            let wordIdx = 0;
            return displayWords.map((dw, i) => {
              if (!normalizeForRecite(dw)) return <span key={i} style={s.memWordPending}>{dw}</span>;
              const st = reciteStates[wordIdx]; wordIdx++;
              const wstyle = st === 'matched' ? s.memWord : st === 'mismatch' ? s.memWordWrong : s.memWordPending;
              return <span key={i} style={wstyle}>{dw}</span>;
            });
          })()}
        </div>
        {reciteErr && <div style={s.memMsg}>{reciteErr}</div>}
        {reciteFinished && <div style={s.memMsg}>{finishLine}</div>}
      </div>
      )}
      {drillMode === 'recite' && (
      <div style={s.memControls}>
        <button onClick={() => (reciteListening ? stopRecite() : startRecite())} style={s.memRevealBtn}>{reciteListening ? MEM.RECITE_STOP : MEM.RECITE_START}</button>
        <button onClick={advanceReciteManual} style={s.memListenBtn}>{MEM.RECITE_NEXT}</button>
      </div>
      )}
    </div>
  );
}
