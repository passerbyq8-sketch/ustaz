// ============================================================
// Mode dropdown (header) — dispatch table per the two-kinds-of-mode design.
// 'screen' options navigate to another screen; 'chatMode' options only set the in-chat
// answer style (no navigation). Future لايت/عميق slot in as more {kind:'chatMode'} rows
// with zero structural change. `id` is both the <option> value and the select's value.
// ============================================================
const MODE_OPTIONS = [
  { id: 'chat',     label: 'عادي',    kind: 'chatMode', value: 'chat' },
  { id: 'memorize', label: 'المحفّظ', kind: 'screen',   value: 'memorize' },
];

// ============================================================
// التطبيق
// ============================================================
function App() {
  const [screen, setScreen] = useState('loading');
  const [profile, setProfile] = useState(null);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [depthMode, setDepthMode] = useState('brief'); // 'brief' | 'detailed' | 'scholar' — adult-only 3-state cycle
  const SCHOLAR_ENABLED = true; // scholar (طالب العلم) hidden until RAG expansion; server still accepts it. Flip to true to re-enable the 3rd cycle state.
  const [pendingImage, setPendingImage] = useState(null); // { media_type, data } or null
  const [attachMenuOpen, setAttachMenuOpen] = useState(false);
  const fileInputRef = useRef(null);
  const docInputRef = useRef(null);
  const [isLoading, setIsLoading] = useState(false);
  const [pinInput, setPinInput] = useState('');
  const [pinError, setPinError] = useState(false);
  const [voiceMode, setVoiceMode] = useState(true); // chat TTS on by default; user can mute via the header speaker button
  const [chatMode, setChatMode] = useState('chat'); // dropdown-selected in-chat answer style; 'chat' = normal (المحفّظ switches screen, not chatMode)
  // Parental lock for direct conversation (المكالمة). Dedicated localStorage key, read/written
  // UNCONDITIONALLY (not gated by PERSIST_CONVERSATION, not stored in child_profile which is wiped
  // on load). Stored value 'true' = LOCKED; absent/any-other = allowed (default OPEN — absence
  // carries the default, so we never write 'false').
  const [directConvoLocked, setDirectConvoLocked] = useState(localStorage.getItem('directConvoLocked') === 'true');
  const [isListening, setIsListening] = useState(false);
  const [isSpeaking, setIsSpeaking] = useState(false);
  const [voiceError, setVoiceError] = useState('');
  const messagesEndRef = useRef(null);
  const recognitionRef = useRef(null);
  const transcriptRef = useRef('');
  const baseTextRef = useRef('');        // input snapshot when dictation (re)starts — new speech is appended after it
  const shouldListenRef = useRef(false); // desired mic state; true between start-tap and stop-tap (survives auto-restarts)
  const audioRef = useRef(null);          // عنصر الصوت الوحيد النشِط (TTS أو تلاوة)
  const profileRef = useRef(null);        // synchronous mirror of profile for the audio path — avoids the stale-closure male voice on the greeting
  const audioUnlockedRef = useRef(false); // true after the one-time first-gesture audio unlock (mobile autoplay)
  const sequenceIdRef = useRef(0);        // رمز إلغاء تسلسل الصوت الجاري
  const audioElRef = useRef(null);     // single gesture-unlocked element, REUSED for TTS (iOS autoplay)
  const audioDoneRef = useRef(null);    // current TTS playback resolver, so takeAudioFocus can cancel it cleanly
  const audioPlayTokenRef = useRef(0);  // invalidates stale pause/ended events on the reused element
  const [streamingText, setStreamingText] = useState(null); // live streaming text (null = no stream in flight)
  const [searchingSources, setSearchingSources] = useState(false); // TEXT path only: shows "يبحث في المصادر…" during the silent RAG round-1 wait
  const abortRef = useRef(null);          // aborts the in-flight stream when a new message starts
  const searchTimerRef = useRef(null);    // delayed trigger for the "searching sources…" hint (client-side, time-based)

  // ===== Live voice-call mode (Layer 2) — dedicated recognition + one-turn loop, isolated from the dictation mic =====
  const callRecognitionRef = useRef(null); // dedicated SpeechRecognition for call mode (NOT the dictation instance)
  const callTranscriptRef = useRef('');    // accumulated finals for the current call turn (NEVER written to `input`)
  const silenceTimerRef = useRef(null);    // end-of-turn debounce handle
  const callActiveRef = useRef(false);     // true while a turn is listening; guards against double-fire (timer + onend)
  const callTurnRef = useRef(null);        // latest runCallTurn closure (avoids stale `messages` inside the SR handlers)
  const callMutedRef = useRef(false);      // mirror of isCallMuted for use inside handlers/timers
  const [callState, setCallState] = useState('idle'); // 'idle' | 'listening' | 'thinking' | 'speaking'
  const [isCallMuted, setIsCallMuted] = useState(false);
  const [callHeard, setCallHeard] = useState(''); // light "what I'm hearing" feedback (interim transcript)
  const CALL_SILENCE_MS = 2000; // silence after which a non-empty turn auto-ends (tunable)
  // Layer 3 (continuous call) — anti-leak + auto-end machinery.
  const callGenRef = useRef(0);            // increments on every call ENTER and EXIT; any async continuation comparing a captured value against this ref aborts if they differ.
  const inactivityTimerRef = useRef(null); // 45s no-speech auto-end timer handle (the real loop terminator)

  // تحميل البيانات من التخزين
  useEffect(() => {
    try {
      // مؤقت: التخزين مُعطَّل — تصرّف كأنه تثبيت جديد في كل فتح: امسح الملف والمحادثة معاً،
      // ولا تُحمِّل ملف الطفل، وابدأ دائماً من شاشة التهيئة (لاختبار أطفال مختلفين على نفس الجهاز).
      if (!PERSIST_CONVERSATION) {
        localStorage.removeItem('messages');
        localStorage.removeItem('child_profile');
        setScreen('onboarding');
        return;
      }
      const profileData = localStorage.getItem('child_profile');
      if (profileData) {
        const p = JSON.parse(profileData);
        // Session 06 / Commit 2 (DOB) -- one-shot migration: legacy profiles carry age only.
        // Derive birthYear from it once and persist, so nobody loses their band or re-onboards.
        if (p && p.birthYear == null && p.age != null) {
          p.birthYear = new Date().getFullYear() - (parseInt(p.age, 10) || 0);
          try { localStorage.setItem('child_profile', JSON.stringify(p)); } catch (e) {}
        }
        // DOB refresh: age is DERIVED from birthYear on every boot (approx, +/- 1y accepted),
        // so the stored account ages automatically; deriveCaps/buildSystemPrompt keep reading p.age.
        if (p && p.birthYear != null) {
          const derivedAge = new Date().getFullYear() - (parseInt(p.birthYear, 10) || 0);
          if (derivedAge >= 0 && derivedAge <= 120) p.age = derivedAge;
        }
        profileRef.current = p;
        setProfile(p);
        const msgs = localStorage.getItem('messages');
        if (msgs) setMessages(JSON.parse(msgs));
        setScreen('chat');
      } else {
        setScreen('onboarding');
      }
    } catch {
      setScreen('onboarding');
    }
  }, []);

  // تحميل المصحف الكنسي مسبقاً بعد الإقلاع كي تظهر أول آية فوراً (يُتجاهَل الفشل بهدوء)
  useEffect(() => { loadQuran().catch(() => {}); }, []);

  // Stop audio when leaving a screen. App never unmounts on a screen switch, so playing
  // Audio() objects in audioRef survive; this cleanup fires on every `screen` transition.
  // cancelAudio() is UNCONDITIONAL (stops greeting TTS + recitation on any transition). The
  // abort is gated to "leaving chat" only: the greeting-leak fix needs the abort when leaving
  // chat (chat→memorize/call), but on the startup onboarding→chat transition the greeting's
  // controller is set DURING that transition, so an unconditional abort here would kill the
  // just-started greeting (leaving the UI stuck on the typing dots). `leaving` captures the
  // screen this cleanup belongs to, so we abort only when that screen was 'chat'.
  useEffect(() => {
    const leaving = screen;
    return () => {
      if (leaving === 'chat') { try { abortRef.current?.abort(); } catch (e) {} }
      cancelAudio();
    };
  }, [screen]);

  // Mobile autoplay fix: with chat voice ON by default, the first spoken reply (the greeting) plays
  // after an async callAI gap, so user-activation can lapse and mobile Safari/Chrome may block it.
  // Prime the audio channel once, synchronously inside the first real gesture anywhere in the app
  // (the onboarding tap always precedes the greeting; also covers a returning user who lands in chat).
  // Best-effort and fully guarded — must never break onboarding or the greeting. Does NOT touch the
  // existing blob-play path; it only unlocks the channel.
  const unlockAudioPlayback = () => {
    if (audioUnlockedRef.current) return; // one-time only
    audioUnlockedRef.current = true;
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (Ctx) {
        const ctx = new Ctx();
        if (ctx.state === 'suspended' && ctx.resume) ctx.resume().catch(() => {});
        // A 1-sample silent buffer started within the gesture satisfies the user-activation requirement.
        const src = ctx.createBufferSource();
        src.buffer = ctx.createBuffer(1, 1, 22050);
        src.connect(ctx.destination);
        src.start(0);
      }
    } catch (e) { /* fail silent — never block onboarding or audio */ }
    // iOS: HTML5 <audio> has a SEPARATE activation gate from AudioContext. The blob-play path
    // uses `new Audio()`, so we must also prime an HTML5 element here, inside the gesture, or
    // iOS keeps audio muted. A 1-sample silent WAV (built inline as a Blob — no network) does it.
    try {
      const wav = new Uint8Array([82,73,70,70,38,0,0,0,87,65,86,69,102,109,116,32,16,0,0,0,1,0,1,0,64,31,0,0,128,62,0,0,2,0,16,0,100,97,116,97,2,0,0,0,0,0]);
      const url = URL.createObjectURL(new Blob([wav], { type: 'audio/wav' }));
      const u = audioElRef.current || (audioElRef.current = new Audio()); u.src = url;
      const pr = u.play();
      if (pr && pr.then) pr.then(() => { try { u.pause(); } catch (e) {} URL.revokeObjectURL(url); }).catch(() => { try { URL.revokeObjectURL(url); } catch (e) {} audioUnlockedRef.current = false; }); // play() rejected -> not actually unlocked; allow a later gesture to retry
    } catch (e) { audioUnlockedRef.current = false; /* prime threw -> allow a later gesture to retry */ }
  };

  useEffect(() => {
    const handler = () => { unlockAudioPlayback(); };
    const opts = { capture: true };
    // Stay armed: after a real success the ref guard makes each call a no-op; before success we retry on every gesture.
    window.addEventListener('pointerdown', handler, opts);
    window.addEventListener('keydown', handler, opts);
    return () => {
      window.removeEventListener('pointerdown', handler, opts);
      window.removeEventListener('keydown', handler, opts);
    };
  }, []);

  // إعداد التعرف على الصوت
  useEffect(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    const recognition = new SR();
    recognition.lang = 'ar-SA';
    recognition.continuous = true;       // keep listening across pauses until the user taps the mic off
    recognition.interimResults = true;
    recognition.onresult = (event) => {
      // This ar-SA engine emits CUMULATIVE isFinal results (each later final RE-INCLUDES the
      // earlier text), so appending stacks/duplicates. Mirror the proven call-mode handler:
      // rebuild from index 0 with a prefix-merge and REPLACE the committed buffer (not +=).
      let finalText = '', interim = '';
      for (let i = 0; i < event.results.length; i++) {
        const t = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          const seg = t.trim();
          if (!seg) continue;
          if (!finalText) finalText = seg;
          else if (seg.startsWith(finalText)) finalText = seg;        // cumulative restatement -> replace
          else if (finalText.startsWith(seg)) { /* shorter prefix already covered -> skip */ }
          else finalText = finalText + ' ' + seg;                     // genuine new segment -> append
        } else {
          interim += t;
        }
      }
      transcriptRef.current = finalText;                              // REPLACE (not append) — dedupes cumulative finals
      setInput(baseTextRef.current + transcriptRef.current + interim);
    };
    recognition.onend = () => {
      // Browsers end recognition periodically even in continuous mode. If the user still
      // wants to dictate, fold finalized speech into the base and restart so dictation
      // continues until the mic is tapped off. The mic NEVER sends.
      if (shouldListenRef.current) {
        baseTextRef.current = baseTextRef.current + transcriptRef.current;
        transcriptRef.current = '';
        try {
          recognition.start();
          return;
        } catch (e) {
          // Restart failed (mic dropped or rapid toggling) — stop cleanly, do not loop.
          shouldListenRef.current = false;
          setIsListening(false);
          return;
        }
      }
      shouldListenRef.current = false;
      setIsListening(false);
      // Transcribed text stays in the box for the owner to review/edit/send. No auto-send.
    };
    recognition.onerror = (event) => {
      // Fatal errors end dictation; transient ones (e.g. no-speech) let onend restart it.
      const fatal = ['not-allowed', 'audio-capture', 'service-not-allowed', 'network'];
      if (fatal.includes(event.error)) shouldListenRef.current = false;
      const errorMap = {
        'not-allowed': '🚫 لم يتم السماح بالميكروفون. افتح إعدادات المتصفح واسمح بالميكروفون.',
        'no-speech': '🤫 لم أسمع شيئاً، جرب مرة أخرى.',
        'audio-capture': '🎤 الميكروفون غير متصل.',
        'network': '📡 خطأ في الشبكة.',
        'aborted': '',
      };
      const msg = errorMap[event.error] !== undefined ? errorMap[event.error] : `خطأ: ${event.error}`;
      if (msg) {
        setVoiceError(msg);
        setTimeout(() => setVoiceError(''), 6000);
      }
    };
    recognitionRef.current = recognition;
  }, []);

  useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, streamingText]);

  const saveMessages = (msgs) => {
    if (!PERSIST_CONVERSATION) return; // مؤقت: لا تكتب المحادثة أثناء مرحلة التجارب.
    try { localStorage.setItem('messages', JSON.stringify(msgs)); } catch (e) {}
  };

  // ============================================================
  // مُنسِّق الصوت الموحَّد — مصدر واحد يعمل في كل لحظة
  // ============================================================
  // كل الأصوات (نُطق المربّي عبر ElevenLabs + تلاوة الحُصري) تمرّ عبر audioRef
  // الواحد. بدء أيّ مصدر يُوقف الآخر (takeAudioFocus)، ويُنسَّق التسلسل
  // «كلام → تلاوة → كلام» عبر speakReply. sequenceIdRef يُلغي أي تسلسل جارٍ.

  // إيقاف الصوت النشِط حالياً (دون إلغاء التسلسل) — يُستخدم للتبديل بين المصادر
  const takeAudioFocus = () => {
    audioPlayTokenRef.current++;                 // stale TTS events become no-ops
    const f = audioDoneRef.current;
    audioDoneRef.current = null;
    if (f) { try { f(); } catch (e) {} }          // resolve+detach the in-flight TTS playback
    if (audioRef.current) {
      try { audioRef.current.pause(); } catch (e) {}   // recitation path: pause fires its onpause -> resolves
      audioRef.current = null;
    }
    try { if (audioElRef.current) audioElRef.current.pause(); } catch (e) {}  // actually stop the reused TTS element
  };

  // إلغاء التسلسل الجاري بالكامل (رسالة جديدة / بدء استماع / إيقاف يدوي)
  const cancelAudio = () => {
    sequenceIdRef.current++;
    takeAudioFocus();
    setIsSpeaking(false);
  };
  const stopSpeaking = cancelAudio;

  // ===== خطّ أنابيب الصوت: نفصل "جلب" المقطع الكلاميّ عن "تشغيله" =====
  // fetchSpeechAudio يُحضّر الصوت (tashkeel عند اللزوم + ElevenLabs → blob) دون تشغيلٍ
  // ودون سحبِ التركيز — فيمكن استدعاؤه مُسبقاً أثناء تشغيل مقطعٍ آخر، فيزول صمتُ الانتظار.
  // يُرجع {kind:'blob',url} (صوت ElevenLabs) أو null (فارغ/مُلغى/فشل — فشل آمن بلا صوت).
  const SPEAK_EMOJI_RE = /[\u{1F600}-\u{1F6FF}\u{2700}-\u{27BF}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2300}-\u{23FF}\u{2B50}\u{1F900}-\u{1F9FF}]/gu;
  const fetchSpeechAudio = async (rawText, myId) => {
    const isCurrent = () => myId === undefined || myId === sequenceIdRef.current;
    // إزالة الوسوم وتحويلها لنص طبيعي للنطق (الآية محذوفة هنا — تُتلى لا تُنطق)
    const ttsText = formatForTTS(rawText);
    const cleanText = ttsText.replace(SPEAK_EMOJI_RE, '').trim();
    if (!cleanText || !isCurrent()) return null;

    // فَحص ذكيّ للتشكيل — نتخطّى Haiku إن كان تشكيل Opus كافياً (٦٠٪+)
    const diacriticCount = (cleanText.match(/[ً-ْٰ]/g) || []).length;
    const letterCount = (cleanText.match(/[ء-ي]/g) || []).length;
    const diacriticRatio = letterCount > 0 ? diacriticCount / letterCount : 0;
    let textForTTS = cleanText;
    if (diacriticRatio >= 0.6 || !TTS_TASHKEEL_ENABLED) {
      // النصّ مُشكَّل جيداً من Opus — نَتخطّى Haiku، نوفِّر ثانيةً كاملة
      console.log(`[المربّي] تشكيل Opus كافٍ (${Math.round(diacriticRatio * 100)}٪) — تخطّينا Haiku`);
    } else {
      // التشكيل ناقص — نَستدعي Haiku للضبط
      console.log(`[المربّي] تشكيل ناقص (${Math.round(diacriticRatio * 100)}٪) — نَستدعي Haiku للضبط`);
      try {
        const tashkeelResponse = await fetch('/api/tashkeel', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: cleanText, gender: profileRef.current?.gender }),
        });
        if (tashkeelResponse.ok) {
          const tashkeelData = await tashkeelResponse.json();
          if (tashkeelData.text && tashkeelData.text.trim()) {
            textForTTS = tashkeelData.text;
          }
        }
      } catch (e) {
        console.warn('[المربّي] Tashkeel failed, using original text:', e);
        // نُكمل بالنص الأصلي بدون توقف
      }
    }
    if (!isCurrent()) return null; // أُلغِيَ أثناء التشكيل

    // مفتاح A/B: تجريد التشكيل من النصّ المُرسَل للنطق فقط (العرض يبقى مُشَكَّلاً)
    const spokenText = STRIP_TASHKEEL_FOR_TTS ? stripAllTashkeel(textForTTS) : textForTTS;

    // ElevenLabs TTS — نُحضّر الـ blob فقط، ولا نُشغّل ولا نسحب التركيز هنا
    try {
      const response = await fetch('/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: spokenText, gender: profileRef.current?.gender }),
      });
      if (!isCurrent()) return null; // أُلغِيَ أثناء جلب الصوت
      if (response.ok) {
        const audioBlob = await response.blob();
        if (!isCurrent()) return null;
        const url = URL.createObjectURL(audioBlob);
        if (!isCurrent()) { URL.revokeObjectURL(url); return null; } // مُلغى → لا تُسرّب blob
        return { kind: 'blob', url, consumed: false };
      }
      console.warn('ElevenLabs TTS failed (HTTP ' + response.status + ') — failing safe: no audio, no system-voice fallback');
    } catch (e) {
      console.warn('ElevenLabs TTS error — failing safe: no audio, no system-voice fallback:', e);
    }
    // فشل ElevenLabs → فشل آمن: لا صوت إطلاقاً. تطبيق الأطفال يجب ألّا يُصدر صوت نظامٍ
    // مجهولاً/عشوائياً أبداً، لذا لا نرجع أيّ مقطعٍ كلاميّ. مؤشّر بصري خفيف غير معطِّل يظهر
    // في واجهة المحادثة (يُمسح تلقائياً بعد ٦ ثوانٍ) — لا نُشغّل احتياط المتصفح.
    if (isCurrent()) {
      setVoiceError('🔇 تعذّر تشغيل الصوت — تحقّق من الاتصال وحاول مرة أخرى.');
      setTimeout(() => setVoiceError(''), 6000);
    }
    return null;
  };

  // playPreparedSpeech يستقبل وعدَ تحضيرٍ (قد يكون اكتمل مسبقاً) ويُشغّله. هنا فقط نسحب
  // التركيز ونشغّل — awaitable حتى الانتهاء/الخطأ/الإيقاف. يحترم الإلغاء قبل التشغيل.
  const playPreparedSpeech = async (prepPromise, myId) => {
    const isCurrent = () => myId === undefined || myId === sequenceIdRef.current;
    if (!prepPromise) return;
    let r = null;
    try { r = await prepPromise; } catch (e) { r = null; }
    if (!r) return;
    if (!isCurrent()) { // أُلغِيَ قبل أن نُشغّله — تخلّص من blob المُحضَّر دون تشغيلٍ بائت
      if (r.kind === 'blob' && r.url) { r.consumed = true; URL.revokeObjectURL(r.url); }
      return;
    }
    r.consumed = true;
    takeAudioFocus();
    if (r.kind === 'blob') {
      const audio = audioElRef.current || (audioElRef.current = new Audio());  // REUSE the unlocked element (iOS)
      audioRef.current = audio;
      const myPlay = ++audioPlayTokenRef.current;
      await new Promise((resolve) => {
        let settled = false;
        const finish = () => {
          if (settled) return;
          settled = true;
          audio.onended = null; audio.onerror = null; audio.onpause = null;
          try { URL.revokeObjectURL(r.url); } catch (e) {}
          if (audioRef.current === audio) audioRef.current = null;
          if (audioDoneRef.current === finish) audioDoneRef.current = null;
          resolve();
        };
        audioDoneRef.current = finish;                                   // lets takeAudioFocus cancel cleanly
        const guard = () => { if (myPlay === audioPlayTokenRef.current) finish(); };  // ignore stale events
        audio.onended = guard;
        audio.onerror = guard;
        audio.onpause = guard;
        audio.src = r.url;
        const p = audio.play();
        if (p && p.catch) p.catch(guard);
      });
      return;
    }
    // فشل آمن: لم يَعُد هناك احتياط صوت نظام. أيّ نتيجةٍ غير 'blob' لا تُنطَق إطلاقاً
    // (تطبيق أطفال يجب ألّا يُصدر صوتاً مجهولاً). عملياً الآن تكون النتيجة إمّا 'blob' أو null.
  };

  // تشغيل تلاوة الحُصري — awaitable: يُحَلّ {failed} عند انتهاء/خطأ/إيقاف الصوت
  const playRecitation = (sNum, aNum, myId) => new Promise((resolve) => {
    if (myId !== undefined && myId !== sequenceIdRef.current) return resolve({ failed: false });
    takeAudioFocus();
    const pad3 = (x) => String(x).padStart(3, '0');
    const url = `https://everyayah.com/data/Husary_64kbps/${pad3(sNum)}${pad3(aNum)}.mp3`;
    const audio = new Audio(url);
    audioRef.current = audio;
    let settled = false;
    const done = (failed) => {
      if (settled) return;
      settled = true;
      if (audioRef.current === audio) audioRef.current = null;
      resolve({ failed: !!failed });
    };
    audio.onended = () => done(false);
    audio.onerror = () => done(true);
    audio.onpause = () => done(false); // سحب التركيز من مصدر آخر / إيقاف يدوي
    const p = audio.play();
    if (p && p.catch) p.catch(() => done(true));
  });

  // بناء تسلسل الصوت من الردّ: مقاطع كلام + تلاوات (آية مفردة <verse> أو سورة/مدى <surah>).
  // نَقسِم عند حدود <verse>/<surah> — الحديث/الخطوات تبقى داخل مقاطع الكلام (تُنطق عبر
  // formatForTTS)، ونصّ الآية/السورة يقع بين الحدود فلا يُنطق (يتلوه القارئ الحقيقي).
  // Sentence-level TTS streaming: split the teacher's prose into short sentences that flow
  // through the EXISTING prefetch machinery (prep[]/prepareSpeak in speakReply). Only the
  // first sentence is awaited before audio starts; the rest are generated/fetched while the
  // current sentence plays. Does NOT touch fetchSpeechAudio, the mobile audio unlock, or the server.
  // We run formatForTTS BEFORE splitting so a multi-line tag (<steps>/<source>/<hadith> …) is
  // never cut across two chunks; fetchSpeechAudio re-runs formatForTTS per chunk, which is
  // idempotent on already-clean text, so double formatting is safe.
  const splitSpeechIntoSentences = (prose) => {
    const clean = formatForTTS(prose).trim();
    if (!clean) return [];
    const SENT = '\uE000'; // private-use sentinel; never appears in real text
    const marked = clean
      .replace(/([.!\u061F?\u061B])\s+/g, '$1' + SENT) // after . ! ؟ ? ؛ + space (won't split "3.5")
      .replace(/\n+/g, SENT);                           // and at line breaks
    const MIN_CHARS = 40; // merge tiny fragments to avoid choppy micro-requests
    const chunks = [];
    for (let s of marked.split(SENT)) {
      s = s.trim();
      if (!s) continue;
      const n = chunks.length;
      if (n && chunks[n - 1].length < MIN_CHARS) chunks[n - 1] += ' ' + s;
      else chunks.push(s);
    }
    return chunks.length ? chunks : [clean];
  };
  const buildAudioSequence = (text) => {
    // نُنظّف الترميز الناقص أوّلاً كي لا يُرسَل "<verse surah=..." خاماً إلى ElevenLabs
    text = stripIncompleteTags(text);
    const parts = [];
    const blockRe = /<(verse|surah|dhikr)([^>]*)>[\s\S]*?<\/\1>/g;
    let last = 0, m;
    while ((m = blockRe.exec(text)) !== null) {
      const before = text.slice(last, m.index);
      for (const chunk of splitSpeechIntoSentences(before)) parts.push({ kind: 'speak', text: chunk });
      const tag = m[1], attrs = m[2] || '';
      if (tag === 'dhikr') { // dhikr - recorded Hisn al-Muslim recitation, auto-played inline (empty <dhikr id="N">)
        const catId = (attrs.match(/id=["']([^"']+)["']/) || [])[1];
        if (catId) parts.push({ kind: 'reciteDhikr', catId });
      } else if (tag === 'verse') {
        const sNum = resolveSurahNumber(
          (attrs.match(/surah=["']([^"']+)["']/) || [])[1],
          (attrs.match(/surah_num=["']([^"']+)["']/) || [])[1]
        );
        const aNum = parseInt((attrs.match(/ayah=["']([^"']+)["']/) || [])[1], 10);
        if (sNum && aNum >= 1) parts.push({ kind: 'recite', sNum, aNum });
      } else { // surah — تلاوة متتابعة لمدًى من الآيات
        const sNum = resolveSurahNumber(undefined, (attrs.match(/num=["']([^"']+)["']/) || [])[1]);
        const from = parseInt((attrs.match(/from=["']([^"']+)["']/) || [])[1], 10);
        const to = parseInt((attrs.match(/to=["']([^"']+)["']/) || [])[1], 10);
        if (sNum) parts.push({ kind: 'reciteSurah', sNum, from: from >= 1 ? from : 1, to: to >= 1 ? to : null });
      }
      last = m.index + m[0].length;
    }
    const tail = text.slice(last);
    for (const chunk of splitSpeechIntoSentences(tail)) parts.push({ kind: 'speak', text: chunk });
    return parts;
  };

  // تلاوة سورة/مدًى متتابعاً بصوت القارئ، مع تحميلٍ مُسبقٍ للآية التالية → بلا فجوات.
  // يحترم الإلغاء (sequenceIdRef/takeAudioFocus). يُرجع {failed}.
  const playSurahRecitation = async (sNum, from, to, myId) => {
    const isCurrent = () => myId === undefined || myId === sequenceIdRef.current;
    if (!sNum) return { failed: true };
    let f = from >= 1 ? from : 1;
    let t = to;
    if (!(t >= 1)) { // المدى مفتوح → السورة كاملة: نحتاج عدد الآيات من المصحف
      try { await loadQuran(); } catch (e) {}
      t = getSurahAyahCount(sNum);
    }
    if (!(t >= f)) return { failed: true };
    const pad3 = (x) => String(x).padStart(3, '0');
    const mkUrl = (a) => `https://everyayah.com/data/Husary_64kbps/${pad3(sNum)}${pad3(a)}.mp3`;
    const makePreload = (a) => {
      if (a > t) return null;
      const au = new Audio();
      au.preload = 'auto';
      au.src = mkUrl(a);
      try { au.load(); } catch (e) {}
      return au;
    };
    const playOne = (audio) => new Promise((res) => {
      if (!isCurrent()) return res({ failed: false });
      takeAudioFocus();
      audioRef.current = audio;
      let settled = false;
      const done = (failed) => {
        if (settled) return;
        settled = true;
        if (audioRef.current === audio) audioRef.current = null;
        res({ failed: !!failed });
      };
      audio.onended = () => done(false);
      audio.onerror = () => done(true);
      audio.onpause = () => done(false); // سحب التركيز من مصدر آخر / إيقاف يدوي
      const p = audio.play();
      if (p && p.catch) p.catch(() => done(true));
    });
    let failedAny = false;
    let cur = makePreload(f);
    for (let a = f; a <= t; a++) {
      if (!isCurrent()) break;
      const audio = cur || makePreload(a);
      const nextAudio = makePreload(a + 1); // حضّر التالية أثناء تشغيل الحالية → بلا فجوة
      const res = await playOne(audio);
      if (res.failed) failedAny = true;
      if (!isCurrent()) {
        if (nextAudio) { try { nextAudio.pause(); nextAudio.src = ''; } catch (e) {} }
        break;
      }
      cur = nextAudio;
    }
    return { failed: failedAny };
  };

  // إعادة تشغيل تلاوة السورة يدوياً من زرّ البطاقة — يُوقف كلام المربّي أولاً. awaitable.
  const playSurahManual = async (sNum, from, to) => {
    const myId = ++sequenceIdRef.current; // يُلغي أي تسلسل/كلام جارٍ
    takeAudioFocus();
    setIsSpeaking(true);
    const res = await playSurahRecitation(sNum, from, to, myId);
    if (myId === sequenceIdRef.current) setIsSpeaking(false);
    return res;
  };

  // تحميل مسبق رخيص لتلاوةٍ قادمة (تسخين كاش المتصفح) — أفضل جهد، يُتجاهَل أيّ فشل.
  const __preloadedRecitations = new Set();
  const preloadRecitation = (sNum, aNum) => {
    if (!sNum || !(aNum >= 1)) return;
    const pad3 = (x) => String(x).padStart(3, '0');
    const url = `https://everyayah.com/data/Husary_64kbps/${pad3(sNum)}${pad3(aNum)}.mp3`;
    if (__preloadedRecitations.has(url)) return;
    __preloadedRecitations.add(url);
    try { fetch(url, { mode: 'no-cors' }).catch(() => {}); } catch (e) {}
  };

  // تشغيل الردّ كاملاً بالتنسيق: كلام-قبل → تلاوة → كلام-بعد، مع إمكان الإلغاء.
  // الإصلاح (ب): نُحضّر المقطع الكلاميّ التالي (ElevenLabs) أثناء تشغيل الحاليّ، فيبدأ
  // فوراً عند انتهاء التلاوة/الكلام بلا صمتِ انتظار. كلّ تحضيرٍ يحترم الإلغاء (sequenceIdRef)،
  // وأيّ صوتٍ مُحضَّرٍ لم يُشغَّل يُلغى ويُحرَّر (لا يُشغَّل مقطعٌ بائت أبداً).
  const speakReply = async (text) => {
    if (!text) return;
    const parts = buildAudioSequence(text);
    if (!parts.length) return;
    const myId = ++sequenceIdRef.current; // يُلغي أي تسلسل سابق
    takeAudioFocus();
    setIsSpeaking(true);

    // وعود تحضير المقاطع الكلامية (index → Promise<{kind,...}|null>)
    const prep = new Array(parts.length).fill(null);
    const prepareSpeak = (i) => {
      if (i < 0 || i >= parts.length || parts[i].kind !== 'speak') return null;
      if (!prep[i]) prep[i] = fetchSpeechAudio(parts[i].text, myId);
      return prep[i];
    };
    const nextSpeakIndex = (from) => {
      for (let j = from; j < parts.length; j++) if (parts[j].kind === 'speak') return j;
      return -1;
    };

    // ابدأ تحضير أوّل مقطعٍ كلاميّ فوراً (لا شيء نُوازيه قبله — تأخيره الابتدائيّ كاليوم).
    prepareSpeak(nextSpeakIndex(0));

    for (let i = 0; i < parts.length; i++) {
      if (myId !== sequenceIdRef.current) break; // أُلغِيَ
      const part = parts[i];
      // أثناء تشغيل المقطع الحاليّ: حضّر المقطع الكلاميّ القادم، وسخّن التلاوة التالية إن وُجدت.
      const nx = nextSpeakIndex(i + 1);
      if (nx >= 0) prepareSpeak(nx);
      if (i + 1 < parts.length) {
        const np = parts[i + 1];
        if (np.kind === 'recite') preloadRecitation(np.sNum, np.aNum);
        else if (np.kind === 'reciteSurah') preloadRecitation(np.sNum, np.from || 1);
      }
      try {
        if (part.kind === 'speak') await playPreparedSpeech(prepareSpeak(i), myId);
        else if (part.kind === 'reciteSurah') await playSurahRecitation(part.sNum, part.from || 1, part.to, myId);
        else if (part.kind === 'reciteDhikr') await playDhikrRecitation(part.catId, myId);
        else await playRecitation(part.sNum, part.aNum, myId);
      } catch (e) {}
      if (myId !== sequenceIdRef.current) break;
    }
    if (myId === sequenceIdRef.current) setIsSpeaking(false);

    // نظافة: حرّر أيّ صوتٍ كلاميّ مُحضَّرٍ لم يُشغَّل (إلغاء/خطأ) كي لا تتسرّب blob URLs.
    for (let i = 0; i < prep.length; i++) {
      const pr = prep[i];
      if (!pr) continue;
      Promise.resolve(pr).then((r) => {
        if (r && r.kind === 'blob' && r.url && !r.consumed) URL.revokeObjectURL(r.url);
      }).catch(() => {});
    }
  };

  // إعادة تشغيل التلاوة يدوياً من زر البطاقة — يُوقف كلام المربّي أولاً. awaitable.
  const playVerseManual = async (sNum, aNum) => {
    const myId = ++sequenceIdRef.current; // يُلغي أي تسلسل/كلام جارٍ
    takeAudioFocus();
    setIsSpeaking(true);
    const res = await playRecitation(sNum, aNum, myId);
    if (myId === sequenceIdRef.current) setIsSpeaking(false);
    return res;
  };

  // Auto-play the recorded Hisn al-Muslim recitation for a dua/dhikr category, inline in the
  // audio sequence -- the dhikr counterpart of playSurahRecitation for a verse. Plays each
  // item's d.audio (from adhkar.json) in order, in the reciter's recorded voice (NOT Murabbi
  // TTS). Respects cancellation (sequenceIdRef/takeAudioFocus) and reuses the same new Audio
  // pattern as the recitation path -- no parallel player. Items without audio stay silent.
  const playDhikrRecitation = async (catId, myId) => {
    const isCurrent = () => myId === undefined || myId === sequenceIdRef.current;
    if (!catId) return { failed: true };
    let items = [];
    try {
      const db = await loadAdhkar();
      items = (db && db.byCat && db.byCat[parseInt(catId, 10)]) || [];
    } catch (e) { return { failed: true }; }
    const urls = items.map((d) => d && d.audio).filter(Boolean);
    if (!urls.length) return { failed: false };
    const playOne = (url) => new Promise((res) => {
      if (!isCurrent()) return res({ failed: false });
      takeAudioFocus();
      const audio = new Audio(url);
      audioRef.current = audio;
      let settled = false;
      const done = (failed) => {
        if (settled) return;
        settled = true;
        if (audioRef.current === audio) audioRef.current = null;
        res({ failed: !!failed });
      };
      audio.onended = () => done(false);
      audio.onerror = () => done(true);
      audio.onpause = () => done(false);
      const p = audio.play();
      if (p && p.catch) p.catch(() => done(true));
    });
    let failedAny = false;
    for (const url of urls) {
      if (!isCurrent()) break;
      const res = await playOne(url);
      if (res.failed) failedAny = true;
      if (!isCurrent()) break;
    }
    return { failed: failedAny };
  };

  // CALL_STREAM_SPEECH streaming speech. Speaks COMPLETE prose sentences that arrive
  // BEFORE the first tag (first-audio latency win); the moment any tag appears, streaming
  // stops and everything from the first tag onward is played by the PROVEN buildAudioSequence
  // at finish(). One session (sequenceIdRef) so barge-in / cancelAudio stops it; reuses the
  // existing play machinery -- no parallel player. feed(full) is used as callAI onDelta;
  // finish(fullReply) replaces speakReply(reply) and resolves when playback ends.
  const createCallSpeechStream = () => {
    const myId = ++sequenceIdRef.current;   // one session; cancelAudio()/barge-in bump this to stop us
    takeAudioFocus();
    setIsSpeaking(true);
    const queue = [];
    let consuming = false, inputDone = false, hitTag = false, consumedLen = 0;
    let resolveDone;
    const donePromise = new Promise((r) => { resolveDone = r; });
    const isCurrent = () => myId === sequenceIdRef.current;
    const finishUp = () => { if (isCurrent()) setIsSpeaking(false); resolveDone(); };
    const pump = async () => {
      if (consuming) return;
      consuming = true;
      while (true) {
        if (!isCurrent()) { consuming = false; finishUp(); return; }         // barge-in / superseded
        if (queue.length === 0) {
          if (inputDone) { consuming = false; finishUp(); return; }
          consuming = false; return;                                          // idle; re-kicked by enqueue/finish
        }
        const seg = queue.shift();
        try {
          if (seg.kind === 'speak') await playPreparedSpeech(fetchSpeechAudio(seg.text, myId), myId);
          else if (seg.kind === 'reciteSurah') await playSurahRecitation(seg.sNum, seg.from || 1, seg.to, myId);
          else if (seg.kind === 'reciteDhikr') await playDhikrRecitation(seg.catId, myId);
          else await playRecitation(seg.sNum, seg.aNum, myId);
        } catch (e) {}
      }
    };
    const enqueue = (segs) => { for (const s of segs) queue.push(s); pump(); };
    // last safe cut inside tag-free prose: end of the last COMPLETE sentence
    const lastSentenceCut = (s) => {
      let cut = 0, re = /[.!\u061F?\u061B]\s|\n/g, m;
      while ((m = re.exec(s)) !== null) cut = m.index + m[0].length;
      return cut;
    };
    const feed = (full) => {
      if (!isCurrent() || hitTag) return;
      const safe = stripIncompleteTags(full);                 // drops any incomplete trailing tag
      const tm = /<(verse|surah|hadith|steps|suggestions|source|dhikr)[\s>\/]/.exec(safe);
      const firstTag = tm ? tm.index : safe.length;           // prose is streamable only BEFORE the first tag
      const region = safe.slice(consumedLen, firstTag);       // tag-free prose not yet spoken
      const cut = tm ? region.length : lastSentenceCut(region); // tag present -> flush prose up to it; else complete sentences only
      if (cut > 0) {
        const segs = [];
        for (const c of splitSpeechIntoSentences(region.slice(0, cut))) segs.push({ kind: 'speak', text: c });
        consumedLen += cut;
        enqueue(segs);
      }
      if (tm) hitTag = true;   // reached a tag -> stop streaming; finish() plays the rest via buildAudioSequence
    };
    const finish = async (fullReply) => {
      const rest = (fullReply || '').slice(consumedLen);      // tags + any trailing prose not yet spoken
      if (rest.trim()) enqueue(buildAudioSequence(rest));
      inputDone = true;
      pump();
      await donePromise;
    };
    return { feed, finish };
  };

  const startListening = async () => {
    if (!recognitionRef.current) {
      setVoiceError('🚫 متصفحك لا يدعم التعرف على الصوت. استخدم Chrome أو Safari.');
      setTimeout(() => setVoiceError(''), 6000);
      return;
    }
    try {
      if (navigator.mediaDevices?.getUserMedia) {
        const s = await navigator.mediaDevices.getUserMedia({ audio: true });
        s.getTracks().forEach(t => t.stop());
      }
    } catch (e) {
      setVoiceError('🚫 لم يُمنح إذن الميكروفون.');
      setTimeout(() => setVoiceError(''), 6000);
      return;
    }
    if (isSpeaking) stopSpeaking();
    // Snapshot the current box (typed or previously dictated, incl. hand-edits) as the base.
    // New speech is appended AFTER it — nothing already there is erased or replaced.
    baseTextRef.current = input && !/\s$/.test(input) ? input + ' ' : input;
    transcriptRef.current = '';
    shouldListenRef.current = true;
    setVoiceError('');
    setIsListening(true);
    try { recognitionRef.current.start(); } catch (e) { shouldListenRef.current = false; setIsListening(false); }
  };

  const stopListening = () => {
    // User tapped the mic off: prevent the onend auto-restart and keep the text in the box.
    shouldListenRef.current = false;
    if (recognitionRef.current) recognitionRef.current.stop();
  };

  const startChat = async (name, age, gender) => {
    // Session 06 / Commit 2 (DOB, option A): birthYear is the authoritative stored datum.
    // age stays on the object as a DERIVED value (approx, +/- 1y: month unknown) and is
    // recomputed from birthYear on every boot load, so accounts grow automatically.
    const birthYear = new Date().getFullYear() - (parseInt(age, 10) || 0);
    const p = { name, age, gender, birthYear, createdAt: new Date().toISOString() };
    profileRef.current = p;
    setProfile(p);
    setScreen('chat');
    try { localStorage.setItem('child_profile', JSON.stringify(p)); } catch (e) {}
    await sendInitialGreeting(p);
  };

  const callAI = async (history, p, { onDelta, signal, mode = 'chat', endpoint = (mode === 'call' ? '/api/chat' : '/api/ask') } = {}) => {
    const FAST_CHANNEL_ENABLED = true;
    const __classifyFast = async () => {
      try {
        const __ex = (m) => (m && typeof m.content === 'string') ? m.content : (m && typeof m.text === 'string') ? m.text : (m && Array.isArray(m.content)) ? m.content.map(c => (c && typeof c.text === 'string') ? c.text : '').join(' ') : '';
        const __n = (history || []).length;
        const __curText = __ex(__n ? history[__n - 1] : null).trim();

  const onPickImage = async (e) => {

      });
    } catch (e) {
      if (e.name === 'AbortError') return; // exited mid-turn — do not write state
      reply = getFriendlyError('network', profile?.gender);
    }
    if (abortRef.current !== controller) return; // superseded or call exited
    abortRef.current = null;
    const aiMsg = { role: 'assistant', content: reply, timestamp: new Date().toISOString() };
    const final = [...updated, aiMsg];
    setMessages(final);
    saveMessages(final);
    setCallState('speaking');
    if (CALL_STREAM_SPEECH && callStream) await callStream.finish(reply); // stream: flush remainder + await playback drain (same completion contract)
    else await speakReply(reply); // completion hook -- resolves when playback fully finishes
    // Layer 3 guarded auto-rearm. speakReply cannot reject and resolves only after playback ends.
    if (callGenRef.current !== myGen) return;                   // End/exit or session change during playback → do NOT re-arm
    if (callActiveRef.current) return;                          // a manual interrupt already re-opened the mic → don't double-arm
    if (callMutedRef.current) { setCallState('idle'); return; } // muted → idle; user re-arms manually
    startCallListening();                                       // continuous: reopen the mic for the next turn
  };

  // Keep callTurnRef pointing at the latest runCallTurn so the (once-created) SR handlers always
  // see the current messages/profile rather than a stale closure.
  useEffect(() => { callTurnRef.current = runCallTurn; });

  // Mute toggle — actually gates the mic: muted = stop/suppress listening (not just visual).
  const toggleCallMute = () => {
    setIsCallMuted((m) => {
      const next = !m;
      callMutedRef.current = next;
      if (next) {
        callActiveRef.current = false;
        if (silenceTimerRef.current) { clearTimeout(silenceTimerRef.current); silenceTimerRef.current = null; }
        clearInactivityTimer(); // leaving listening (muted) — stop the idle clock; user re-arms manually
        try { callRecognitionRef.current?.stop(); } catch (e) {}
        setCallState((csNow) => (csNow === 'listening' ? 'idle' : csNow));
      }
      return next;
    });
  };

  // Avatar tap = "my turn". Layer 3 makes it state-aware: it is the manual interrupt (no voice
  // barge-in). Tapping during think/speak cancels the tutor and opens the mic; from idle it starts.
  const onCallTalk = () => {
    if (callMutedRef.current) return;
    if (callState === 'thinking' || callState === 'speaking') {
      // Manual interrupt: cancel the in-flight turn + tutor audio, then open the mic for the child.
      if (abortRef.current) abortRef.current.abort(); // thinking: aborts callAI -> runCallTurn bails at the AbortError guard (before re-arm)
      cancelAudio();                                  // speaking: stops playback (speakReply resolves; EDIT-A re-arm suppressed by its callActiveRef guard)
      startCallListening();
      return;
    }
    if (callState === 'idle') startCallListening();
    // 'listening' → no-op (unchanged from Layer 2)
  };

  // Call-screen lifecycle: create/tear down the dedicated recognition with the call screen.
  // On entry: force the dictation mic OFF and stop any audio so the two can never fight.
  // On exit: stop recognition, clear the timer, abort any in-flight turn, and stop audio.
  useEffect(() => {
    if (screen !== 'call') return;
    callGenRef.current++; // ENTER: open a new call session (invalidates any stale continuation)
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setVoiceError('🚫 متصفحك لا يدعم التعرف على الصوت. استخدم Chrome أو Safari.');
      setTimeout(() => setVoiceError(''), 6000);
      return;
    }
    // Force the dictation mic off (never modify it — just ensure it is not running).
    shouldListenRef.current = false;
    try { recognitionRef.current?.stop(); } catch (e) {}
    cancelAudio();
    callActiveRef.current = false;
    callTranscriptRef.current = '';
    setCallHeard('');
    setCallState('idle');

    const rec = new SR();
    rec.lang = 'ar-SA';
    rec.continuous = true;       // interim events keep resetting the silence timer (smoother end-of-turn)
    rec.interimResults = true;
    rec.onresult = (event) => {
      // This ar-SA engine emits multiple isFinal results where each later final RE-INCLUDES the
      // earlier final text (cumulative restatement), so concatenating all finals double-counts.
      // Merge instead: a final that extends what we have (starts with the accumulated text) REPLACES
      // it; a final already covered is skipped; only a genuinely new (non-overlapping) final is
      // appended. Correct for this cumulative engine AND standard segmented engines.
      let finalText = '', interim = '';
      for (let i = 0; i < event.results.length; i++) {
        const t = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          const seg = t.trim();
          if (!seg) continue;
          if (!finalText) finalText = seg;
          else if (seg.startsWith(finalText)) finalText = seg;        // cumulative restatement -> replace
          else if (finalText.startsWith(seg)) { /* shorter prefix already covered -> skip */ }
          else finalText = finalText + ' ' + seg;                     // genuine new segment -> append
        } else {
          interim += t;
        }
      }
      callTranscriptRef.current = finalText;
      setCallHeard((finalText + interim).trim()); // feedback only — NEVER setInput
      // Layer 3: actual speech this event → child present → reset the 45s idle clock.
      if ((finalText + interim).trim()) armInactivityTimer();
      // Reset the end-of-turn debounce on any speech activity.
      if (silenceTimerRef.current) clearTimeout(silenceTimerRef.current);
      silenceTimerRef.current = setTimeout(() => {
        // Fire only with a non-empty transcript; silence on an empty turn keeps listening.
        if (callActiveRef.current && callTranscriptRef.current.trim()) endCallTurnNow();
      }, CALL_SILENCE_MS);
    };
    rec.onend = () => {
      if (silenceTimerRef.current) { clearTimeout(silenceTimerRef.current); silenceTimerRef.current = null; }
      if (callActiveRef.current && callTranscriptRef.current.trim()) { endCallTurnNow(); return; }
      // Layer 3: empty/silence engine self-close during an active listen → stay live by re-arming
      // after a short backoff (prevents a tight start→onend→start loop). The 45s idle clock is NOT
      // reset here (armIdleClock=false), so genuine silence still reaches the inactivity auto-end.
      if (callActiveRef.current) {
        callActiveRef.current = false;
        const genAtEnd = callGenRef.current;
        if (callMutedRef.current) { setCallState('idle'); return; }
        setCallState('listening'); // keep the UI in listening; we are re-opening
        setTimeout(() => {
          if (callGenRef.current !== genAtEnd) return;          // ended/changed during backoff → bail
          if (callMutedRef.current) { setCallState('idle'); return; }
          startCallListening(false);                            // re-open WITHOUT resetting the idle clock
        }, 400);
      }
    };
    rec.onerror = (event) => {
      if (silenceTimerRef.current) { clearTimeout(silenceTimerRef.current); silenceTimerRef.current = null; }
      callActiveRef.current = false;
      setCallState('idle');
      const fatal = ['not-allowed', 'audio-capture', 'service-not-allowed'];
      if (fatal.includes(event.error)) {
        setVoiceError('🚫 لم يُمنح إذن الميكروفون.');
        setTimeout(() => setVoiceError(''), 6000);
      }
    };
    callRecognitionRef.current = rec;

    return () => {
      callGenRef.current++; // EXIT: invalidate every in-flight continuation (re-arm / backoff / inactivity)
      callActiveRef.current = false;
      if (silenceTimerRef.current) { clearTimeout(silenceTimerRef.current); silenceTimerRef.current = null; }
      clearInactivityTimer();
      try { rec.onresult = null; rec.onend = null; rec.onerror = null; rec.stop(); } catch (e) {}
      callRecognitionRef.current = null;
      if (abortRef.current) { try { abortRef.current.abort(); } catch (e) {} }
      cancelAudio();
      callMutedRef.current = false;
      setIsCallMuted(false);
      setCallHeard('');
      setCallState('idle');
    };
  }, [screen]);

  // Toggle the parental direct-conversation lock. Locking writes 'true'; unlocking REMOVES the key
  // (absence = allowed default — we never persist 'false').
  const toggleDirectConvoLock = () => setDirectConvoLocked(prev => {
    const next = !prev;
    try { if (next) localStorage.setItem('directConvoLocked', 'true'); else localStorage.removeItem('directConvoLocked'); } catch (e) {}
    return next;
  });

  const resetAll = () => {
    if (confirm('هل أنت متأكد من حذف كل البيانات؟')) {
      localStorage.removeItem('child_profile');
      localStorage.removeItem('messages');
      localStorage.removeItem('directConvoLocked');
      setDirectConvoLocked(false);
      setProfile(null);
      setMessages([]);
      setScreen('onboarding');
    }
  };

  if (screen === 'loading') return <div style={s.loadingScreen}><div style={s.loadingSpinner}>✨</div></div>;
  if (screen === 'onboarding') return <Onboarding onStart={startChat} />;
  if (screen === 'parentGate') return <ParentGate pinInput={pinInput} setPinInput={setPinInput} pinError={pinError} setPinError={setPinError} onSuccess={() => { setPinInput(''); setPinError(false); setScreen('parentDashboard'); }} onBack={() => { setPinInput(''); setPinError(false); setScreen('chat'); }} />;
  if (screen === 'parentDashboard') return <ParentDashboard profile={profile} messages={messages} onBack={() => setScreen('chat')} onReset={resetAll} directConvoLocked={directConvoLocked} onToggleDirectConvo={toggleDirectConvoLock} />;
  if (screen === 'call') return <CallScreen profileName={profile?.name} gender={profile?.gender} callState={callState} heard={callHeard} isMuted={isCallMuted} onToggleMute={toggleCallMute} onTalk={onCallTalk} onExit={() => setScreen('chat')} />;
  // المحفّظ — full screen (mirrors CallScreen). Husary playback reuses the App-scoped manual
  // entry points (playVerseManual/playSurahManual) passed down as props; no new audio code.
  if (screen === 'memorize') return <MemorizeScreen profile={profile} onExit={() => setScreen('chat')} onPlayVerse={playVerseManual} onPlaySurah={playSurahManual} onStopAudio={cancelAudio} />;

  // Single-source capability flags for the chat UI. `directConvoAllowed` layers the parental lock
  // on top of the band: young is allowed unless the parent explicitly locked it; teen/adult always
  // allowed (the lock does not apply to them).
  const caps = deriveCaps(profile?.age);
  const directConvoAllowed = caps.band === 'young' ? !directConvoLocked : true;

  return (
    <div style={s.chatContainer}>
      <div style={s.header}>
        <div style={s.headerContent}>
          <div style={{ ...s.avatar, ...(isSpeaking ? { animation: 'pulse 1s ease-in-out infinite' } : {}) }}>
            <MoonStarsIcon size={20} color="#E0B96B" />
          </div>
          <div>
            <div style={s.headerTitle}>{profile?.gender === 'female' ? 'المربّية' : 'المربّي'}</div>
            <div style={s.headerSubtitle}>
              {isSpeaking ? '🔊 يتحدث...' : isListening ? '🎤 يستمع...' : `${profile?.name} • ${profile?.age} سنوات`}
            </div>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <select
            value={chatMode}
            onChange={(e) => {
              const opt = MODE_OPTIONS.find((o) => o.id === e.target.value);
              if (!opt) return;
              if (opt.kind === 'screen') setScreen(opt.value);          // navigate (e.g. المحفّظ)
              else if (opt.kind === 'chatMode') setChatMode(opt.value); // in-chat style only
            }}
            style={s.modeSelect}
            aria-label={profile?.gender === 'female' ? 'وضع المربّية' : 'وضع المربّي'}
          >
            {MODE_OPTIONS.map((o) => <option key={o.id} value={o.id} style={{ color: '#2C5F5D', background: '#FFFFFF' }}>{o.label}</option>)}
          </select>
          {directConvoAllowed && (
          <button onClick={() => setScreen('call')} style={s.settingsBtn} aria-label="مكالمة صوتية مباشرة">
            <PhoneCallIcon size={18} color="#FAF7F2" />
          </button>
          )}
          <button onClick={() => { if (voiceMode) stopSpeaking(); setVoiceMode(!voiceMode); }} style={{ ...s.settingsBtn, background: voiceMode ? '#2C5F5D' : '#F0EBE0' }}>
            {voiceMode ? <VolumeIcon size={18} color="#FAF7F2" /> : <VolumeOffIcon size={18} color="#2C5F5D" />}
          </button>
          <button onClick={() => setScreen('parentGate')} style={s.settingsBtn}>
            <LockIcon size={18} color="#2C5F5D" />
          </button>
        </div>
      </div>

      <div style={s.messagesArea}>
        {/* آية اليوم — تظهر دائماً في الأعلى */}
        <DailyVerseCard />

        {/* رقائق المواضيع — تظهر فقط في بداية المحادثة */}
        {messages.length <= 1 && !isLoading && (
          <TopicChips onTopicClick={(prompt) => sendMessage(prompt)} />
        )}

        {messages.map((m, i) => <MessageBubble key={i} message={m} onSuggestionClick={(sg) => sendMessage(sg)} onPlayVerse={playVerseManual} onPlaySurah={playSurahManual} onStopAudio={cancelAudio} age={profile?.age} />)}
        {streamingText !== null && (
          <div style={{ ...s.messageBubble, ...s.assistantBubble, alignSelf: 'flex-end' }}>
            {formatForStreamPreview(streamingText)
              ? <div style={s.bubbleText}>{formatForStreamPreview(streamingText)}</div>
              : searchingSources
                ? <div style={s.searchingHint}>
                    <span>يبحث في المصادر…</span>
                    <span style={s.dot}>●</span>
                    <span style={{ ...s.dot, animationDelay: '0.2s' }}>●</span>
                    <span style={{ ...s.dot, animationDelay: '0.4s' }}>●</span>
                  </div>
                : <div style={s.typingDots}>
                    <span style={s.dot}>●</span>
                    <span style={{ ...s.dot, animationDelay: '0.2s' }}>●</span>
                    <span style={{ ...s.dot, animationDelay: '0.4s' }}>●</span>
                  </div>}
          </div>
        )}
        <div ref={messagesEndRef} />
      </div>

      {voiceError && <div style={s.errorBanner}>{voiceError}</div>}

      {pendingImage && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '6px 10px' }}>
          {(pendingImage.kind === 'image' || pendingImage.kind === undefined) ? (
            <img src={`data:${pendingImage.media_type};base64,${pendingImage.data}`} style={{ height: 56, borderRadius: 8, border: '1px solid #E5DDD0' }} />
          ) : (
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, padding: '6px 10px', borderRadius: 8, border: '1px solid #E5DDD0', background: '#FAF7F2', fontSize: 14 }}>
              <span>📄</span>
              <span>{pendingImage.name}</span>
              <span style={{ color: '#8A7E6B', fontSize: 12 }}>{pendingImage.kind === 'pdf' ? 'PDF' : 'نصّ'}</span>
            </span>
          )}
          <button onClick={() => setPendingImage(null)} style={{ background: 'none', border: 'none', color: '#C44536', fontSize: 18, cursor: 'pointer' }} aria-label="إزالة الصورة">×</button>
        </div>
      )}
      <div style={s.inputBar}>
        <button
          onClick={isListening ? stopListening : startListening}
          disabled={isLoading}
          style={{
            ...s.micBtn,
            background: isListening ? 'linear-gradient(135deg, #C44536 0%, #A03828 100%)' : 'linear-gradient(135deg, #C9A961 0%, #B5944A 100%)',
            animation: isListening ? 'pulse 1.2s ease-in-out infinite' : 'none',
            opacity: isLoading ? 0.4 : 1,
          }}
        >
          {isListening ? <MicOffIcon size={20} color="#FAF7F2" /> : <MicIcon size={20} color="#FAF7F2" />}
        </button>
        {/* image-only input */}
        <input ref={fileInputRef} type="file" accept="image/*" onChange={onPickImage} style={{ display: 'none' }} />
        {/* document input (PDF / TXT) */}
        <input ref={docInputRef} type="file" accept=".pdf,application/pdf,.txt,text/plain,.docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document" onChange={onPickImage} style={{ display: 'none' }} />

        {caps.band === 'adult' && (
          <button
            onClick={() => setDepthMode(depthMode === 'brief' ? 'detailed' : depthMode === 'detailed' ? (SCHOLAR_ENABLED ? 'scholar' : 'brief') : 'brief')}
            disabled={isLoading}
            title={"اضغط لتغيير العمق المعرفي"}
            aria-label={depthMode === 'brief' ? "موجز" : depthMode === 'detailed' ? "مفصّل" : "طالب العلم"}
            style={{
              ...s.sendBtn,
              background: depthMode === 'brief' ? '#F0EBE0' : depthMode === 'detailed' ? 'linear-gradient(135deg, #2C5F5D 0%, #244F4D 100%)' : 'linear-gradient(135deg, #7A5C2E 0%, #5E4522 100%)',
              opacity: isLoading ? 0.4 : 1,
              fontSize: 13,
              fontWeight: 700,
              color: depthMode === 'brief' ? '#2C5F5D' : '#FAF7F2',
              minWidth: 52,
                    whiteSpace: 'nowrap',
                    paddingInline: 10,
            }}
          >
            {depthMode === 'brief' ? "موجز" : depthMode === 'detailed' ? "مفصّل" : "طالب العلم"}
          </button>
          )}
        {caps.upload && (
        <div style={{ position: 'relative', display: 'inline-flex' }}>
          {attachMenuOpen && (
            <>
              {/* backdrop: closes menu on outside click */}
              <div onClick={() => setAttachMenuOpen(false)} style={{ position: 'fixed', inset: 0, zIndex: 40 }} />
              {/* menu: opens above the button (composer is at the bottom) */}
              <div style={{ position: 'absolute', bottom: '120%', right: 0, zIndex: 41, background: '#FFFDF8', border: '1px solid #E5DDD0', borderRadius: 12, boxShadow: '0 6px 20px rgba(0,0,0,0.14)', padding: 6, minWidth: 168, display: 'flex', flexDirection: 'column', gap: 2 }}>
                <button
                  onClick={() => { setAttachMenuOpen(false); if (fileInputRef.current) fileInputRef.current.click(); }}
                  style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', background: 'none', border: 'none', borderRadius: 8, cursor: 'pointer', fontSize: 15, color: '#234A44', width: '100%', textAlign: 'right' }}
                >
                  <span style={{ fontSize: 18 }}>🖼️</span><span>صورة</span>
                </button>
                <button
                  onClick={() => { setAttachMenuOpen(false); if (docInputRef.current) docInputRef.current.click(); }}
                  style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', background: 'none', border: 'none', borderRadius: 8, cursor: 'pointer', fontSize: 15, color: '#234A44', width: '100%', textAlign: 'right' }}
                >
                  <span style={{ fontSize: 18 }}>📄</span><span>ملف</span>
                </button>
              </div>
            </>
          )}
          <button
            onClick={() => setAttachMenuOpen(v => !v)}
            disabled={isLoading || isListening}
            style={{ ...s.sendBtn, opacity: (isLoading || isListening) ? 0.4 : 1 }}
            aria-label="إرفاق ملف أو صورة"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FAF7F2" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        )}
        <input
          value={input}
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => e.key === 'Enter' && sendMessage(input)}
          placeholder={isListening ? 'استمع إليك...' : 'اكتب هنا...'}
          style={s.input}
          disabled={isLoading || isListening}
        />
        <button onClick={() => sendMessage(input)} disabled={isLoading || (!input.trim() && !pendingImage)} style={{ ...s.sendBtn, opacity: isLoading || !input.trim() ? 0.4 : 1 }}>
          <SendIcon size={20} color="#FAF7F2" />
        </button>
      </div>
    </div>
  );
}

function MessageBubble({ message, onSuggestionClick, onPlayVerse, onPlaySurah, onStopAudio, age }) {
  const isUser = message.role === 'user';
  if (isUser) {
    const c = message.content;
    if (Array.isArray(c)) {
      const imgBlock = c.find(b => b && b.type === 'image');
      const txtBlock = c.find(b => b && b.type === 'text');
      return (
        <div style={{ ...s.messageBubble, ...s.userBubble, animation: 'fadeIn 0.3s ease-out' }}>
          {imgBlock && <img src={`data:${imgBlock.source.media_type};base64,${imgBlock.source.data}`} style={{ maxWidth: '100%', borderRadius: 10, marginBottom: txtBlock ? 8 : 0, display: 'block' }} />}
          {txtBlock && txtBlock.text}
        </div>
      );
    }
    return <div style={{ ...s.messageBubble, ...s.userBubble, animation: 'fadeIn 0.3s ease-out' }}>{c}</div>;
  }
  // رسالة الأستاذ: نحلّلها لاستخراج البطاقات
  const { segments, suggestions } = parseRichMessage(message.content, age);
  return (
    <div style={{ animation: 'fadeIn 0.3s ease-out', display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 8, maxWidth: '92%', alignSelf: 'flex-end' }}>
      <div style={{ ...s.assistantBubble, padding: '14px 16px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {segments.map((seg, i) => {
          if (seg.type === 'text') {
            return <div key={i} style={s.bubbleText}>{seg.content}</div>;
          }
          if (seg.type === 'verse') {
            return <VerseCard key={i} surah={seg.surah} surahNum={seg.surahNum} ayah={seg.ayah} onPlayVerse={onPlayVerse} onStopAudio={onStopAudio} />;
          }
          if (seg.type === 'surah') {
            return <SurahCard key={i} num={seg.num} from={seg.from} to={seg.to} onPlaySurah={onPlaySurah} onStopAudio={onStopAudio} />;
          }
          if (seg.type === 'hadith') {
            return <HadithCard key={i} content={seg.content} narrator={seg.narrator} ruling={seg.ruling} />;
          }
          if (seg.type === 'source') {
            return <SourceCard key={i} site={seg.site} url={seg.url} content={seg.content} />;
          }
          if (seg.type === 'dhikr') {
            return <DhikrCard key={i} catId={seg.catId} />;
          }
          if (seg.type === 'steps') {
            return <StepsCard key={i} items={seg.items} />;
          }
          if (seg.type === 'board') {
            return <BoardCard key={i} content={seg.content} />;
          }
          if (seg.type === 'document') {
            return <DocumentCard key={i} title={seg.title} content={seg.content} age={age} />;
          }
          return null;
        })}
      </div>
      {suggestions && suggestions.length > 0 && (
        <div style={s.suggestionsInline}>
          {suggestions.map((sg, i) => (
            <button key={i} onClick={() => onSuggestionClick && onSuggestionClick(sg)} style={s.suggestionChipSmall}>
              {sg}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function VerseCard({ surah, surahNum, ayah, onPlayVerse, onStopAudio }) {
  const [playing, setPlaying] = useState(false);
  const [audioFailed, setAudioFailed] = useState(false);
  // نصّ الآية يأتي حصراً من المصحف الكنسي المُحمَّل، لا من النموذج.
  const [verseText, setVerseText] = useState('');
  const [textState, setTextState] = useState('loading'); // loading | ok | fail
  const audioRef = useRef(null); // fallback محلي فقط (إن لم تُمرَّر دوال المنسِّق)

  const sNum = resolveSurahNumber(surah, surahNum);
  const aNum = parseInt(ayah, 10);
  const canPlay = !!sNum && aNum >= 1;
  const surahName = surah || (sNum ? SURAH_NAMES[sNum] : '');
  const pad3 = (x) => String(x).padStart(3, '0');
  const audioUrl = canPlay
    ? `https://everyayah.com/data/Husary_64kbps/${pad3(sNum)}${pad3(aNum)}.mp3`
    : null;

  // جلب نصّ الآية الكنسي مرة واحدة (مُخزَّن في الذاكرة). عند الفشل: لا نصّ —
  // نعرض المرجع وزرّ التلاوة فقط، ولا نقع أبداً على نصّ النموذج أو ترميز خام.
  useEffect(() => {
    let alive = true;
    if (!canPlay) { setTextState('fail'); return; }
    loadQuran()
      .then(() => {
        if (!alive) return;
        const t = getVerseText(sNum, aNum);
        if (t) { setVerseText(t); setTextState('ok'); }
        else { setTextState('fail'); }
      })
      .catch(() => { if (alive) setTextState('fail'); });
    return () => { alive = false; };
  }, [sNum, aNum, canPlay]);

  // إيقاف صوت fallback المحلي وتنظيفه عند إزالة البطاقة
  useEffect(() => () => { if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; } }, []);

  // إعادة تشغيل يدوية — عبر منسِّق App: يُوقف كلام المربّي أولاً ثم يُعيد التلاوة.
  // الزر الآن «تكرار» يدوي؛ التلاوة تُشغَّل تلقائياً ضمن تسلسل الردّ في App.
  const togglePlay = () => {
    // مسار المنسِّق الموحَّد (الاستخدام الفعلي في المحادثة)
    if (onPlayVerse) {
      if (playing) {
        if (onStopAudio) onStopAudio();
        setPlaying(false);
        return;
      }
      setAudioFailed(false);
      setPlaying(true);
      Promise.resolve(onPlayVerse(sNum, aNum))
        .then((res) => { setPlaying(false); if (res && res.failed) setAudioFailed(true); })
        .catch(() => { setPlaying(false); setAudioFailed(true); });
      return;
    }
    // fallback محلي (لو رُكِّبت البطاقة خارج المحادثة بدون دوال المنسِّق)
    setAudioFailed(false);
    if (!audioRef.current) {
      const audio = new Audio(audioUrl);
      audio.onended = () => setPlaying(false);
      audio.onerror = () => { setPlaying(false); setAudioFailed(true); };
      audioRef.current = audio;
    }
    const audio = audioRef.current;
    if (playing) {
      audio.pause();
      setPlaying(false);
    } else {
      setPlaying(true);
      const p = audio.play();
      if (p && p.catch) p.catch(() => { setPlaying(false); setAudioFailed(true); });
    }
  };

  return (
    <div style={s.verseCard}>
      <div style={s.verseCardLabel}>
        <span>قَالَ اللهُ تَعَالَى</span>
      </div>
      {textState === 'ok' && <div style={s.verseText}>{verseText}</div>}
      <div style={s.verseFooter}>
        {(surahName || ayah) && (
          <div style={s.verseMeta}>
            {surahName && `سورة ${surahName}`}{surahName && ayah && '، '}{ayah && `آية ${ayah}`}
          </div>
        )}
        {canPlay && (
          <button
            type="button"
            onClick={togglePlay}
            style={s.versePlayBtn}
            aria-label={playing ? 'إيقاف التلاوة' : 'تشغيل التلاوة'}
          >
            {playing ? <PauseIcon size={14} /> : <PlayIcon size={14} />}
            <span>{playing ? 'إيقاف' : 'استمع للتلاوة'}</span>
          </button>
        )}
      </div>
      {audioFailed && <div style={s.verseAudioError}>تعذّر تحميل التلاوة</div>}
    </div>
  );
}

// بطاقة السورة الكاملة (أو مدًى متّصل): نصّ واحد متّصل بأرقام آيات ۝، وزرّ تلاوة واحد.
// النصّ من المصحف الكنسي حصراً؛ عند الفشل نعرض الاسم والمدى فقط (لا نصّ نموذج ولا ترميز خام).
function SurahCard({ num, from, to, onPlaySurah, onStopAudio }) {
  const [playing, setPlaying] = useState(false);
  const [audioFailed, setAudioFailed] = useState(false);
  const [body, setBody] = useState('');
  const [state, setState] = useState('loading'); // loading | ok | fail
  const [range, setRange] = useState({ from: 0, to: 0, whole: false });

  const sNum = resolveSurahNumber(undefined, num);
  const surahName = sNum ? SURAH_NAMES[sNum] : '';

  useEffect(() => {
    let alive = true;
    if (!sNum) { setState('fail'); return; }
    loadQuran()
      .then(() => {
        if (!alive) return;
        const count = getSurahAyahCount(sNum);
        if (!count) { setState('fail'); return; }
        let f = parseInt(from, 10); if (!(f >= 1)) f = 1;
        let t = parseInt(to, 10); if (!(t >= 1) || t > count) t = count;
        if (f > t) { setState('fail'); return; }
        setRange({ from: f, to: t, whole: f === 1 && t === count });
        const pieces = [];
        // البسملة (للسورة كاملة من الآية ١) — غير مرقّمة، إلا الفاتحة (آية ١) والتوبة (لا بسملة).
        // نُعيد استخدام نصّ البسملة الكنسي getVerseText(1,1) — لا نكتب نصّاً قرآنياً يدوياً.
        if (f === 1 && sNum !== 1 && sNum !== 9) {
          const basmala = getVerseText(1, 1);
          if (basmala) pieces.push(basmala);
        }
        let missing = false;
        for (let a = f; a <= t; a++) {
          const vt = getVerseText(sNum, a);
          if (!vt) { missing = true; break; }
          pieces.push(`${vt} ۝${toArabicDigits(a)}`); // آية + رقمها داخل زخرفة نهاية الآية
        }
        if (missing) { setState('fail'); return; }
        setBody(pieces.join(' '));
        setState('ok');
      })
      .catch(() => { if (alive) setState('fail'); });
    return () => { alive = false; };
  }, [sNum, from, to]);

  const metaLabel = !surahName ? ''
    : range.whole ? `سورة ${surahName}`
    : (range.from ? `سورة ${surahName}، الآيات ${toArabicDigits(range.from)}–${toArabicDigits(range.to)}` : `سورة ${surahName}`);

  const togglePlay = () => {
    if (!onPlaySurah) return;
    if (playing) {
      if (onStopAudio) onStopAudio();
      setPlaying(false);
      return;
    }
    setAudioFailed(false);
    setPlaying(true);
    Promise.resolve(onPlaySurah(sNum, range.from || 1, range.to || null))
      .then((res) => { setPlaying(false); if (res && res.failed) setAudioFailed(true); })
      .catch(() => { setPlaying(false); setAudioFailed(true); });
  };

  return (
    <div style={s.verseCard}>
      <div style={s.verseCardLabel}>
        <span>قَالَ اللهُ تَعَالَى{surahName ? ` — سُورَةُ ${surahName}` : ''}</span>
      </div>
      {state === 'ok' && <div style={s.surahText}>{body}</div>}
      <div style={s.verseFooter}>
        {metaLabel && <div style={s.verseMeta}>{metaLabel}</div>}
        {sNum && (
          <button
            type="button"
            onClick={togglePlay}
            style={s.versePlayBtn}
            aria-label={playing ? 'إيقاف التلاوة' : 'تشغيل التلاوة كاملة'}
          >
            {playing ? <PauseIcon size={14} /> : <PlayIcon size={14} />}
            <span>{playing ? 'إيقاف' : 'استمع للتلاوة (كاملة)'}</span>
          </button>
        )}
      </div>
      {audioFailed && <div style={s.verseAudioError}>تعذّر تحميل التلاوة</div>}
    </div>
  );
}

// بطاقة المصدر: شريحةُ عزوٍ قابلةٌ للنقر في نهاية الجواب — أوّلُ رابطٍ خارجيٍّ في التطبيق.
// تُظهِر اسمَ النطاق (site) ثمّ وصفاً عربيّاً موجزاً (المحتوى)، وتفتح url في تبويبٍ جديد.
function SourceCard({ site, url, content }) {
  // اسمُ النطاق للعرض: نُفضّل site، وإلا نشتقّه من رابط الصفحة إن أمكن.
  let host = (site || '').trim();
  if (!host && url) {
    try { host = new URL(url).hostname.replace(/^www\./, ''); } catch (e) { host = ''; }
  }
  const label = host || 'المصدر';
  const text = (content || '').trim() || host || url || '';
  const body = [
    <span key="site" style={s.sourceChipSite}>{label}</span>,
    text ? <span key="text" style={s.sourceChipText}>{text}</span> : null,
    <span key="arrow" style={s.sourceChipArrow} aria-hidden="true">↗</span>,
  ];
  // حمايةٌ من رابطٍ مفقود: بلا url نرسم شريحةً نصّيّةً غير قابلةٍ للنقر — لا <a href=""> أبداً.
  if (!url) {
    return <div style={s.sourceChip}>{body}</div>;
  }
  return (
    <a href={url} target="_blank" rel="noopener noreferrer" style={{ ...s.sourceChip, ...s.sourceChipLink }}>
      {body}
    </a>
  );
}

        setItems(list);
        if (list[0]) setTitle(list[0].category || '');
      })

    if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }

const PARENTAL_GATE_ENABLED = false; // Session 08: gate off during testing - MUST be true before store release
function AdultGate({ a, b, onPass, onCancel }) {
  const [answer, setAnswer] = useState("");
  const [error, setError] = useState(false);
  const submit = () => {
    const v = parseInt(String(answer).replace(/[٠-٩]/g, x => x.charCodeAt(0) - 0x0660), 10);

    else { setError(true); setTimeout(() => setError(false), 1500); }

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20, background: "rgba(30,30,30,0.6)" }}>

        {error && <div style={{ color: "#C44536", fontSize: 14, marginTop: -4, marginBottom: 8 }}>جواب غير صحيح، حاول مرة أخرى</div>}

  const [showAdultInput, setShowAdultInput] = useState(false); // عند اختيار "أكبر من ١٨" نكشف حقل العمر الدقيق
  const [adultAge, setAdultAge] = useState('');
  const adultInputRef = useRef(null);
  const toLatinDigits = (str) => String(str || '').replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d)).replace(/[۰-۹]/g, d => '۰۱۲۳۴۵۶۷۸۹'.indexOf(d));
  const adultAgeNum = parseInt(toLatinDigits(adultAge), 10);
  const adultAgeValid = adultAgeNum >= 18 && adultAgeNum <= 99;

    if (PARENTAL_GATE_ENABLED && n >= 18) {

    <div style={s.onboardingContainer}>

                  onClick={() => adultAgeValid && requestStart(adultAgeNum)}
                  disabled={!adultAgeValid}
                  style={{ ...s.primaryBtn, opacity: adultAgeValid ? 1 : 0.4 }}
                >
                  ابدأ
                </button>
              </div>
            )}
          </>
        )}
      </div>
      </div>
    </div>
  );
}

function ParentGate({ pinInput, setPinInput, pinError, setPinError, onSuccess, onBack }) {
  const handleSubmit = () => {

  };
  return (
    <div style={s.onboardingContainer}>
      <div style={s.onboardingCard}>
        <div style={s.bigEmoji}>🔒</div>
        <div style={s.onboardingTitle}>لوحة الأهل</div>

        <input type="password" value={pinInput} onChange={(e) => setPinInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSubmit()} placeholder="••••" style={{ ...s.onboardingInput, textAlign: 'center', letterSpacing: '0.5em', borderColor: pinError ? '#C44536' : '#E5DDD0' }} autoFocus />
        {pinError && <div style={{ color: '#C44536', fontSize: 14, marginTop: -8, marginBottom: 8 }}>رمز خاطئ</div>}

    </div>

}

// Live call screen (Layer 2 — one automatic turn; presentational, driven by App state)
// ============================================================
// callState is owned by App and driven by real audio events (tap → listening → thinking →
// speaking → idle). The avatar is tap-to-talk; Mute gates the mic. No audio logic lives here.
function CallScreen({ profileName, gender, callState, heard, isMuted, onToggleMute, onTalk, onExit }) {
  // Accessibility: respect reduced-motion — fall back to a static (non-pulsing) ring.
  const reduceMotion = (typeof window !== 'undefined' && window.matchMedia)
    ? window.matchMedia('(prefers-reduced-motion: reduce)').matches : false;

  const STATES = {
    idle:      { label: 'اضغط للتحدّث',       ring: 'rgba(250, 247, 242, 0.35)', speed: '3.6s' },
    listening: { label: 'أستمع إليك...',     ring: '#3FA66A',                 speed: '2.4s' },
    thinking:  { label: 'لحظة...',            ring: 'rgba(201, 169, 97, 0.55)', speed: '3.2s' },
    speaking:  { label: gender === 'female' ? 'المربّية تتحدّث...' : 'المربّي يتحدّث...',  ring: '#C9A961',                 speed: '1.2s' },
  };
  const cs = STATES[callState] || STATES.idle;

  const ringStyle = {
    ...s.callRing,
    borderColor: cs.ring,
    animation: reduceMotion ? 'none' : `callPulse ${cs.speed} ease-in-out infinite`,
  };

  // Layer 3: the avatar stays tappable while the tutor is thinking/speaking — tapping there is the
  // manual interrupt ("my turn"). Disabled only when muted, or during 'listening' (no-op as before).
  const canTalk = !isMuted && (callState === 'idle' || callState === 'thinking' || callState === 'speaking');

  return (
    <div style={s.callContainer}>
      <div style={s.callTopLabel}>{gender === 'female' ? 'مكالمة مع المربّية' : 'مكالمة مع المربّي'}</div>
      <div style={s.callCenter}>
        <div style={{ ...s.callAvatarWrap, cursor: canTalk ? 'pointer' : 'default' }} onClick={canTalk ? onTalk : undefined}>
          <div style={ringStyle} />
          <div style={s.callAvatar}><MoonStarsIcon size={56} color="#E0B96B" /></div>
        </div>
        {profileName && <div style={s.callSubLabel}>{profileName}</div>}
        {/* Live feedback: what the mic is hearing (interim). Empty when not listening. */}
        <div style={s.callHint}>{callState === 'listening' && heard ? heard : (isMuted ? 'الميكروفون مكتوم' : '')}</div>
      </div>
      <div style={s.callControls}>
        <button onClick={onToggleMute} style={s.callMuteBtn}>
          {isMuted ? <MicOffIcon size={24} color="#2C5F5D" /> : <MicIcon size={24} color="#2C5F5D" />}
          <span style={s.callBtnLabel}>{isMuted ? 'مكتوم' : 'كتم'}</span>
        </button>
        <button onClick={onExit} style={s.callEndBtn}>
          <PhoneOffIcon size={24} color="#FAF7F2" />
          <span style={{ ...s.callBtnLabel, color: '#FAF7F2' }}>إنهاء</span>
        </button>
      </div>
    </div>
  );
}
